<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Plants vs. Budget Lack</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #111;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            background-image: linear-gradient(135deg, #111827, #0b0f19);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        #loading-title {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            text-align: center;
        }

        #loading-sub {
            font-size: clamp(12px, 3vw, 16px);
            color: #8892b0;
            margin-bottom: 30px;
            text-align: center;
        }

        .progress-container {
            width: min(100%, 300px);
            height: 14px;
            background-color: #1e293b;
            border-radius: 10px;
            padding: 2px;
            border: 2px solid #334155;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
            transition: width 0.05s linear;
        }

        #start-action-btn {
            display: none;
            padding: 15px 40px;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: 3px solid #b33939;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(230, 126, 34, 0.5);
            animation: pulse 1.5s infinite;
            touch-action: manipulation;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(230, 126, 34, 0.5); }
            50% { transform: scale(1.04); box-shadow: 0 0 30px rgba(230, 126, 34, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(230, 126, 34, 0.5); }
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #main-menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('menu_image.png');
            background-size: cover;
            background-position: center;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            gap: 20px;
            padding: 20px;
        }

        .menu-btn {
            padding: 15px 30px;
            font-size: clamp(18px, 4vw, 26px);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: 4px solid #1e8449;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, background 0.2s;
            width: min(100%, 380px);
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            touch-action: manipulation;
        }

        .menu-btn:active { transform: scale(0.98); }

        .menu-btn.exit {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-color: #962d22;
        }

        /* РУЛЕТКА */
        #fortune-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 30, 40, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            color: white;
            padding: 20px;
        }

        #wheel-title {
            font-size: clamp(20px, 5vw, 36px);
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            color: #f1c40f;
            text-align: center;
        }

        #wheel-container {
            position: relative;
            width: min(85vw, 400px);
            height: min(85vw, 400px);
        }

        #wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 18;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        #wheelCanvas {
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            width: 100% !important;
            height: 100% !important;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #top-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border-bottom: 4px solid #d35400;
            padding: 5px 15px;
            width: 100%;
            min-height: 44px;
            height: auto;
            color: #fff;
            font-weight: bold;
            font-size: clamp(14px, 4vw, 20px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .panel-section { display: flex; align-items: center; gap: 5px; }
        #sun-icon { font-size: clamp(18px, 5vw, 24px); margin-right: 4px; }
        #zombie-counter-panel { font-size: clamp(11px, 3vw, 16px) !important; text-align: right; }

        /* ИГРОВОЙ ХОЛСТ */
        #canvas-wrapper {
            flex: 1;
            width: 100%;
            background-color: #144218;
            overflow: hidden;
            position: relative;
        }

        #gameCanvas {
            background-color: #1a5e20;
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: crisp-edges;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        #bottom-container {
            background-color: #2c3e50;
            border-top: 4px solid #34495e;
            padding: 8px;
            width: 100%;
            min-height: 80px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            gap: 8px;
            flex-shrink: 0;
        }

        #cards-container { 
            display: flex; 
            gap: 6px; 
            align-items: center; 
            flex: 1;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        #cards-container::-webkit-scrollbar { display: none; }

        .card {
            position: relative;
            width: clamp(55px, 11vw, 90px);
            height: clamp(55px, 11vh, 80px);
            flex-shrink: 0;
            background: #ecf0f1;
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: clamp(8px, 1.5vw, 11px);
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s, opacity 0.2s, transform 0.05s;
            color: #2c3e50;
            overflow: hidden;
            line-height: 1.2;
            touch-action: manipulation;
        }
        .card:active { transform: scale(0.96); }
        
        .card-cooldown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s ease;
        }
        
        .card.cooldown-active .card-cooldown-overlay { opacity: 1; }
        .card.disabled {
            background-color: #95a5a6 !important;
            border-color: #7f8c8d !important;
            color: #7f8c8d;
            opacity: 0.6;
        }
        .card .cost { font-size: clamp(8px, 1.5vw, 11px); color: #d35400; margin-top: 2px; }

        /* ЛОПАТА */
        .shovel-btn {
            width: clamp(55px, 11vw, 90px);
            height: clamp(55px, 11vh, 80px);
            flex-shrink: 0;
            background: linear-gradient(135deg, #7f8c8d, #95a5a6);
            border: 3px solid #7f8c8d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(24px, 5vw, 36px);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.05s, background 0.2s;
            touch-action: manipulation;
        }
        .shovel-btn:active { transform: scale(0.96); }
        .shovel-btn.active {
            border-color: #e74c3c;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            animation: pulse-shovel 1s infinite;
        }

        .right-buttons {
            display: flex;
            flex-direction: column;
            gap: 4px;
            justify-content: center;
            flex-shrink: 0;
        }

        .cheat-btn, .pause-btn, .summon-gargantuar-btn {
            padding: 6px 8px;
            font-size: clamp(9px, 1.5vw, 12px);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border: 2px solid #6c3483;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.05s, background 0.2s;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            white-space: nowrap;
            text-align: center;
            touch-action: manipulation;
        }
        .cheat-btn:active, .pause-btn:active, .summon-gargantuar-btn:active { transform: scale(0.96); }
        
        .summon-gargantuar-btn {
            background: linear-gradient(135deg, #e67e22, #d35400);
            border-color: #a04000;
        }
        
        .pause-btn {
            background: linear-gradient(135deg, #f39c12, #d35400);
            border-color: #a04000;
        }

        #game-over-screen, #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: bold;
            z-index: 10;
            padding: 20px;
        }
        #game-over-screen { color: #e74c3c; }
        #victory-screen { color: #2ecc71; }
        #victory-subtext { font-size: clamp(16px, 4vw, 28px); color: #fff; margin-top: 15px; font-weight: normal; }

        #pause-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            padding: 20px;
        }

        .pause-dialog {
            background: #2c3e50;
            border: 4px solid #f1c40f;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: min(100%, 320px);
        }

        .pause-title {
            color: #fff;
            font-size: clamp(24px, 5vw, 36px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .pause-menu-btn {
            width: 100%;
            padding: 12px 20px;
            font-size: clamp(16px, 3.5vw, 22px);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: 3px solid #1e8449;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            touch-action: manipulation;
        }
        .pause-menu-btn.exit { background: linear-gradient(135deg, #e74c3c, #c0392b); border-color: #962d22; }
        
        .restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 20px;
            background: #2ecc71;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="loading-screen">
        <div id="loading-title">ЗАГРУЗКА ИГРЫ...</div>
        <div id="loading-sub">Подготовка текстур и звуков</div>
        <div class="progress-container">
            <div id="main-progress-bar" class="progress-bar"></div>
        </div>
        <button id="start-action-btn">КЛИК ДЛЯ СТАРТА</button>
    </div>

    <div id="main-menu-screen">
        <button class="menu-btn" onclick="openWheelOfFortune(false)">ОБЫЧНЫЙ РЕЖИМ</button>
        <button class="menu-btn" onclick="openWheelOfFortune(true)" style="background: linear-gradient(135deg, #9b59b6, #8e44ad); border-color: #6c3483;">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
        <button class="menu-btn exit" onclick="exitGame()">ВЫХОД</button>
    </div>

    <div id="fortune-screen">
        <div id="wheel-title">Определение размера волны зомби...</div>
        <div id="wheel-container">
            <div id="wheel-pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
    </div>

    <div id="pause-screen">
        <div class="pause-dialog">
            <div class="pause-title">ПАУЗА</div>
            <button class="pause-menu-btn" onclick="resumeGame()">ПРОДОЛЖИТЬ</button>
            <button class="pause-menu-btn exit" onclick="goToMenu()">ВЫХОД</button>
        </div>
    </div>

    <div id="top-panel">
        <div class="panel-section">
            <span id="sun-icon">☀️</span> <span id="sun-count">150</span>
        </div>
        <div class="panel-section" id="zombie-counter-panel">
            Осталось: <span id="zombies-left-count">0</span> / <span id="zombies-total-count">0</span>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bottom-container">
        <div id="cards-container">
            <div class="card" id="card-peashooter">
                Горох
                <div class="cost">☀️100</div>
                <div class="card-cooldown-overlay" id="cd-peashooter">0</div>
            </div>
            <div class="card" id="card-icepeashooter">
                Лед
                <div class="cost">☀️175</div>
                <div class="card-cooldown-overlay" id="cd-icepeashooter">0</div>
            </div>
            <div class="card" id="card-sunflower">
                Солнце
                <div class="cost">☀️50</div>
                <div class="card-cooldown-overlay" id="cd-sunflower">0</div>
            </div>
            <div class="card" id="card-wallnut">
                Орех
                <div class="cost">☀️50</div>
                <div class="card-cooldown-overlay" id="cd-wallnut">0</div>
            </div>
            <div class="card" id="card-chomper">
                Чомпер
                <div class="cost">☀️150</div>
                <div class="card-cooldown-overlay" id="cd-chomper">0</div>
            </div>
            <div class="card" id="card-cherrybomb">
                Вишня
                <div class="cost">☀️125</div>
                <div class="card-cooldown-overlay" id="cd-cherrybomb">0</div>
            </div>
            <div class="card" id="card-potatomine">
                Мина
                <div class="cost">☀️25</div>
                <div class="card-cooldown-overlay" id="cd-potatomine">0</div>
            </div>

            <div class="shovel-btn" id="shovel-btn" onclick="toggleShovel()" title="Выкопать">
                🪓
            </div>
        </div>

        <div class="right-buttons">
            <button class="cheat-btn" id="cheat-kill-btn" onclick="triggerCheatMassKill()">💥 УБИТЬ</button>
            <button class="summon-gargantuar-btn" id="summon-gargantuar-btn" onclick="summonGargantuar()">🐘 ГАРГ</button>
            <button class="pause-btn" onclick="pauseGame()">⏸️ МЕНЮ</button>
        </div>
    </div>

    <div id="game-over-screen">
        <div>ПОРАЖЕНИЕ!</div>
        <button class="restart-btn" onclick="goToMenu()">В меню</button>
    </div>

    <div id="victory-screen">
        <div>УРОВЕНЬ ПРОЙДЕН!</div>
        <div id="victory-subtext">Возвращение в меню...</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const sunCountEl = document.getElementById('sun-count');
    const shovelBtn = document.getElementById('shovel-btn');
    const canvasWrapper = document.getElementById('canvas-wrapper');
    
    const loadingScreen = document.getElementById('loading-screen');
    const startActionBtn = document.getElementById('start-action-btn');
    
    const cardElements = {
        peashooter: document.getElementById('card-peashooter'),
        icepeashooter: document.getElementById('card-icepeashooter'),
        sunflower: document.getElementById('card-sunflower'),
        wallnut: document.getElementById('card-wallnut'),
        chomper: document.getElementById('card-chomper'),
        cherrybomb: document.getElementById('card-cherrybomb'),
        potatomine: document.getElementById('card-potatomine')
    };

    const cdElements = {
        peashooter: document.getElementById('cd-peashooter'),
        icepeashooter: document.getElementById('cd-icepeashooter'),
        sunflower: document.getElementById('cd-sunflower'),
        wallnut: document.getElementById('cd-wallnut'),
        chomper: document.getElementById('cd-chomper'),
        cherrybomb: document.getElementById('cd-cherrybomb'),
        potatomine: document.getElementById('cd-potatomine')
    };

    const plantCooldownsMax = {
        peashooter: 7000,
        icepeashooter: 7000,
        sunflower: 7000,
        wallnut: 25000,
        chomper: 42000,
        cherrybomb: 35000,
        potatomine: 30000
    };

    let plantCooldownsEnd = { peashooter: 0, icepeashooter: 0, sunflower: 0, wallnut: 0, chomper: 0, cherrybomb: 0, potatomine: 0 };

    const gameOverScreen = document.getElementById('game-over-screen');
    const victoryScreen = document.getElementById('victory-screen');
    const mainMenuScreen = document.getElementById('main-menu-screen');
    const fortuneScreen = document.getElementById('fortune-screen');
    const wheelCanvas = document.getElementById('wheelCanvas');
    const wheelCtx = wheelCanvas.getContext('2d');
    const pauseScreen = document.getElementById('pause-screen');
    const zombieCounterPanel = document.getElementById('zombie-counter-panel');
    const cheatKillBtn = document.getElementById('cheat-kill-btn');

    const wheelNumbers = [];
    for(let i = 20; i <= 50; i++) wheelNumbers.push(i);
    
    let wheelAngle = 0;
    let wheelSpeed = 0;
    let isWheelSpinning = false;
    let selectedZombiesCount = 30;

    let isInfiniteMode = false;
    let isPaused = false;
    let savedPauseTime = 0; 
    let pauseOffsetTotal = 0; 
    
    let gargantuarSpawnCounter = 0;
    let poisonedCells = [];
    
    let isSummoningInProgress = false;

    // --- АУДИОФАЙЛЫ ---
    const audioMenu = new Audio('Menu_Sound.mp3'); audioMenu.loop = true;
    const audioPlay = new Audio('Play_Sound.mp3'); audioPlay.loop = true;
    const audioPosadka = new Audio('posadka.mp3');
    const audioCooldownNotReady = new Audio('cooldown.mp3');
    const audioLopata = new Audio('lopata.mp3');

    function playMenuMusic() {
        audioPlay.pause(); audioPlay.currentTime = 0;
        audioMenu.play().catch(err => console.log("Музыка меню заблокирована:", err));
    }

    function playPlayMusic() {
        audioMenu.pause(); audioMenu.currentTime = 0;
        audioPlay.play().catch(err => console.log("Игровая музыка заблокирована:", err));
    }

    // --- ВСЕ ИЗОБРАЖЕНИЯ ---
    const imgPeashooter = new Image(); imgPeashooter.src = 'goroxostrel.png';
    const imgIcePeashooter = new Image(); imgIcePeashooter.src = 'ice_gorosheck.png';
    const imgSunflower = new Image(); imgSunflower.src = 'podsolnyx.png';
    const imgZombie = new Image(); imgZombie.src = 'zombi-one-part.png';
    const imgZombieBucket = new Image(); imgZombieBucket.src = 'zombi_backet.png';
    const imgZombieCone = new Image(); imgZombieCone.src = 'zombi_konys.png';
    const imgWallnut = new Image(); imgWallnut.src = 'orex.png';
    const imgSunFile = new Image(); imgSunFile.src = 'solnishko.png';
    const imgCherry = new Image(); imgCherry.src = 'vishna.png';
    const imgBoom = new Image(); imgBoom.src = 'BOOM.png';
    const imgMineUnder = new Image(); imgMineUnder.src = 'kartoshka_zemla.png';
    const imgMineReady = new Image(); imgMineReady.src = 'kartoshka.png';
    const imgChomperIdle = new Image(); imgChomperIdle.src = 'chomper_sdyn.png';
    const imgChomperEat = new Image(); imgChomperEat.src = 'chomper_eat.png';
    const imgGargantuar = new Image(); imgGargantuar.src = 'gargantuar.png';

    const allImages = [imgPeashooter, imgIcePeashooter, imgSunflower, imgZombie, imgZombieBucket, imgZombieCone, imgWallnut, imgSunFile, imgCherry, imgBoom, imgMineUnder, imgMineReady, imgChomperIdle, imgChomperEat, imgGargantuar];
    
    let loadedCount = 0;

    let cellWidth = 80; let cellHeight = 80; let spriteSize = 80;

    let gameState = 'loading';

    let gameOver = false;

    let totalZombiesInWave = 0; let zombiesSpawnedSoFar = 0;
    const START_DELAY = 60000; 
    let gameStartTime = 0; let lastZombieSpawnTime = 0;

    function resizeCanvas() {

        if (wrapperWidth > 0 && wrapperHeight > 0) {
            canvas.width = wrapperWidth;
            canvas.height = wrapperHeight;

        }

    function initGrid() {

    function getRandomSpawnInterval() { return Math.random() * (6000 - 4000) + 4000; }

    class Plant {
        constructor(type, r, c) {
            this.type = type; this.r = r; this.c = c;
            this.lastActionTime = Date.now();
            this.birthTime = Date.now(); 
            this.isChewing = false;
            this.chewingEndTime = 0;
            
            if (type === 'peashooter') { this.actionInterval = 4000; this.hp = 10000; }
            else if (type === 'icepeashooter') { this.actionInterval = 4000; this.hp = 10000; }
            else if (type === 'sunflower') { this.actionInterval = 10000; this.hp = 10000; }
            else if (type === 'wallnut') { this.actionInterval = 0; this.hp = 50000; }
            else if (type === 'chomper') { this.actionInterval = 0; this.hp = 10000; }
            else if (type === 'cherrybomb') { this.actionInterval = 3000; this.hp = 999999; }
            else if (type === 'potatomine') { this.actionInterval = 15000; this.hp = 500; this.isReady = false; }
        }

        update(now) {
            if (isPaused) return;
            if (this.type === 'chomper' && this.isChewing && now >= this.chewingEndTime) this.isChewing = false;
            let currentX = this.c * cellWidth;
            
            if ((this.type === 'peashooter' || this.type === 'icepeashooter') && now - this.lastActionTime >= this.actionInterval) {
                const hasZombieInRow = zombies.some(z => z.occupyRows && z.occupyRows.includes(this.r));
                if (hasZombieInRow) {
                    let peaType = this.type === 'icepeashooter' ? 'ice' : 'normal';
                    peas.push(new Pea(currentX + cellWidth/2, this.r * cellHeight + cellHeight / 2, this.r, peaType));
                    this.lastActionTime = now;
                }
            } else if (this.type === 'sunflower' && now - this.lastActionTime >= this.actionInterval) {
                sun += 25;
                updateCardsUI();
                this.lastActionTime = now;
            } else if (this.type === 'chomper' && !this.isChewing) {
                const zombieInFront = zombies.find(z => {
                    const zWidth = z.type === 'gargantuar' ? cellWidth * 1.5 : cellWidth;
                    const zRightEdge = z.x + zWidth;
                    const plantLeftEdge = this.c * cellWidth;
                    return z.occupyRows && z.occupyRows.includes(this.r) && zRightEdge >= plantLeftEdge && z.x <= plantLeftEdge + cellWidth && z.type !== 'gargantuar';
                });
                if (zombieInFront) {
                    const index = zombies.indexOf(zombieInFront);
                    if (index !== -1) zombies.splice(index, 1);
                    this.isChewing = true;
                    this.chewingEndTime = now + 42000;
                    updateZombieCounterUI();
                    checkVictoryCondition();
                }
            } else if (this.type === 'cherrybomb' && now - this.birthTime >= this.actionInterval) {
                this.explodeCherry();
            } else if (this.type === 'potatomine' && !this.isReady && now - this.birthTime >= this.actionInterval) {
                this.isReady = true;
            }
        }

        explodeCherry() {
            const minR = Math.max(0, this.r - 2); const maxR = Math.min(ROWS - 1, this.r + 2);
            const minC = Math.max(0, this.c - 2); const maxC = Math.min(COLS - 1, this.c + 2);
            const minX = minC * cellWidth; const maxX = (maxC + 1) * cellWidth;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                if (z.type !== 'gargantuar') {
                    for (let row of z.occupyRows) {
                        if (row >= minR && row <= maxR) {
                            let zCenterX = z.x + (z.type === 'gargantuar' ? cellWidth * 0.75 : cellWidth / 2);
                            if (zCenterX >= minX && zCenterX <= maxX) {
                                zombies.splice(i, 1);
                                break;
                            }
                        }
                    }
                }
            }
            explosions.push({ x: minX, y: minR * cellHeight, w: maxX - minX, h: (maxR - minR + 1) * cellHeight, endTime: Date.now() + 500 });
            grid[this.r][this.c] = null;
            updateZombieCounterUI();
            checkVictoryCondition();
        }

        explodeMine() {
            const minR = Math.max(0, this.r - 1); const maxR = Math.min(ROWS - 1, this.r + 1);
            const minC = Math.max(0, this.c - 1); const maxC = Math.min(COLS - 1, this.c + 1);
            const minX = minC * cellWidth; const maxX = (maxC + 1) * cellWidth;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                for (let row of z.occupyRows) {
                    if (row >= minR && row <= maxR) {
                        let zCenterX = z.x + (z.type === 'gargantuar' ? cellWidth * 0.75 : cellWidth / 2);
                        if (zCenterX >= minX && zCenterX <= maxX) {
                            zombies.splice(i, 1);
                            break;
                        }
                    }
                }
            }
            explosions.push({ x: minX, y: minR * cellHeight, w: maxX - minX, h: (maxR - minR + 1) * cellHeight, endTime: Date.now() + 500 });
            grid[this.r][this.c] = null;
            updateZombieCounterUI();
            checkVictoryCondition();
        }

        draw(customX = null, customY = null, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            let cellCenterX = (this.c * cellWidth) + (cellWidth / 2);
            let cellCenterY = (this.r * cellHeight) + (cellHeight / 2);
            let drawX = customX !== null ? customX - spriteSize/2 : cellCenterX - spriteSize/2;
            let drawY = customY !== null ? customY - spriteSize/2 : cellCenterY - spriteSize/2;
            let img = null; let fallbackColor = '#fff';
            if (this.type === 'peashooter') { img = imgPeashooter; fallbackColor = '#2ecc71'; }
            else if (this.type === 'icepeashooter') { img = imgIcePeashooter; fallbackColor = '#3498db'; }
            else if (this.type === 'sunflower') { img = imgSunflower; fallbackColor = '#f1c40f'; }
            else if (this.type === 'wallnut') { img = imgWallnut; fallbackColor = '#d35400'; }
            else if (this.type === 'chomper') { img = this.isChewing ? imgChomperEat : imgChomperIdle; fallbackColor = this.isChewing ? '#e67e22' : '#d35400'; }
            else if (this.type === 'cherrybomb') { img = imgCherry; fallbackColor = '#e74c3c'; }
            else if (this.type === 'potatomine') { img = this.isReady ? imgMineReady : imgMineUnder; fallbackColor = this.isReady ? '#e67e22' : '#795548'; }
            if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, drawX, drawY, spriteSize, spriteSize);
            else ctx.fillStyle = fallbackColor, ctx.fillRect(drawX, drawY, spriteSize, spriteSize);
            ctx.restore();
        }
    }

    class Zombie {
        constructor(r, type = 'normal') {
            this.r = r; this.x = canvas.width; 
            this.speed = type === 'gargantuar' ? cellWidth / 12000 : cellWidth / 6000; 
            this.isEating = false;
            this.type = type;
            this.slowedUntil = 0;
            this.originalSpeed = type === 'gargantuar' ? cellWidth / 12000 : cellWidth / 6000;
            this.hasSpawnedMinions = false;
            this.occupyRows = type === 'gargantuar' ? [r, Math.max(0, r-1)] : [r];

            if (this.type === 'bucket') this.hp = 15;
            else if (this.type === 'cone') this.hp = 10;
            else if (this.type === 'gargantuar') this.hp = 150;
            else this.hp = 5;
        }
        
        applySlow(now) {
            if (this.type === 'gargantuar') return;
            this.slowedUntil = now + 5000;
            this.speed = this.originalSpeed * 0.3;
        }
        
        spawnMinions() {
            if (this.type === 'gargantuar' && this.hp <= 75 && !this.hasSpawnedMinions) {
                this.hasSpawnedMinions = true;
                for (let i = 0; i < 5; i++) {
                    let newRow = this.r + (Math.floor(Math.random() * 3) - 1);
                    newRow = Math.max(0, Math.min(ROWS - 1, newRow));
                    zombies.push(new Zombie(newRow, 'cone'));
                }
            }
        }
        
        poisonCell() {
            if (this.type === 'gargantuar') {
                const cellC = Math.floor(this.x / cellWidth);
                if (cellC >= 0 && cellC < COLS) {
                    if (!poisonedCells.some(p => p.r === this.r && p.c === cellC)) {
                        poisonedCells.push({ r: this.r, c: cellC });
                    }
                    if (grid[this.r] && grid[this.r][cellC] !== null) grid[this.r][cellC] = null;
                }
            }
        }
        
        update(now, deltaTime) {
            if (isPaused) return;
            if (this.slowedUntil > 0 && now > this.slowedUntil) {
                this.slowedUntil = 0;
                this.speed = this.originalSpeed;
            }
            this.spawnMinions();
            if (this.x <= 0) { endGame(); return; }
            
            let zombieWidth = this.type === 'gargantuar' ? cellWidth * 1.5 : cellWidth;
            let frontX = this.x + zombieWidth - 10;
            let currentCellC = Math.floor(frontX / cellWidth);
            let nextCellC = currentCellC - 1;

            if (nextCellC >= 0 && nextCellC < COLS) {
                let plantAhead = null;
                for (let row of this.occupyRows) {
                    if (grid[row] && grid[row][nextCellC]) {
                        plantAhead = grid[row][nextCellC];
                        break;
                    }
                }
                let plantBarrierX = (nextCellC + 1) * cellWidth;

                if (plantAhead && frontX <= plantBarrierX + 4) {
                    if (plantAhead.type === 'chomper' && plantAhead.isChewing) {
                        this.isEating = true;
                        plantAhead.hp -= deltaTime;
                        if (plantAhead.hp <= 0) {
                            for (let row of this.occupyRows) if (grid[row] && grid[row][nextCellC] === plantAhead) grid[row][nextCellC] = null;
                            this.isEating = false;
                        }
                        return;
                    }
                    if (plantAhead.type === 'potatomine') {
                        if (plantAhead.isReady) {
                            this.isEating = false;
                            plantAhead.explodeMine();
                            return;
                        } else {
                            this.isEating = true;
                            plantAhead.hp -= deltaTime;
                            if (plantAhead.hp <= 0) {
                                for (let row of this.occupyRows) if (grid[row] && grid[row][nextCellC] === plantAhead) grid[row][nextCellC] = null;
                                this.isEating = false;
                            }
                            return;
                        }
                    }
                    this.isEating = true;
                    plantAhead.hp -= deltaTime; 
                    if (plantAhead.hp <= 0) {
                        for (let row of this.occupyRows) if (grid[row] && grid[row][nextCellC] === plantAhead) grid[row][nextCellC] = null;
                        this.isEating = false;
                    }
                    return; 
                }
            }
            this.isEating = false;
            this.x -= this.speed * deltaTime;
        }
        
        draw() {
            ctx.save();
            let drawSize = this.type === 'gargantuar' ? spriteSize * 1.5 : spriteSize;
            let drawY = (this.r * cellHeight) + (cellHeight / 2) - drawSize / 2;
            let drawX = this.x;
            let img = null; let fallbackColor = '#7f8c8d';
            
            if (this.type === 'gargantuar') { img = imgGargantuar; fallbackColor = '#8B4513'; }
            else if (this.type === 'bucket') { img = imgZombieBucket; fallbackColor = '#34495e'; }
            else if (this.type === 'cone') { img = imgZombieCone; fallbackColor = '#e67e22'; }
            else { img = imgZombie; fallbackColor = '#7f8c8d'; }
            
            if (this.slowedUntil > 0 && this.type !== 'gargantuar') {
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = 'rgba(52, 152, 219, 0.5)';
                ctx.fillRect(drawX, drawY, drawSize, drawSize);
                ctx.globalAlpha = 1;
            }
            
            if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, drawX, drawY, drawSize, drawSize);
            else ctx.fillStyle = fallbackColor, ctx.fillRect(drawX, drawY, drawSize, drawSize);
            
            ctx.restore();
        }
    }

    class Pea {
        constructor(x, y, r, type = 'normal') { 
            this.x = x; this.y = y; this.r = r; this.type = type; this.speed = cellWidth * 0.003; 
        }
        update(deltaTime) {
            if (isPaused) return false;
            this.x += this.speed * deltaTime;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                let zombieWidth = z.type === 'gargantuar' ? cellWidth * 1.5 : cellWidth;
                let zCenterX = z.x + zombieWidth / 2;
                if (z.occupyRows.includes(this.r) && this.x >= zCenterX - zombieWidth/2 && this.x <= zCenterX + zombieWidth/2) {
                    z.hp--; 
                    if (this.type === 'ice') z.applySlow(Date.now());
                    if (z.type === 'gargantuar' && z.hp <= 0) z.poisonCell();
                    if ((z.type === 'bucket' || z.type === 'cone') && z.hp <= 5) z.type = 'normal';
                    if (z.hp <= 0) { 
                        zombies.splice(i, 1); 
                        updateZombieCounterUI(); 
                        checkVictoryCondition(); 
                    }
                    return true; 
                }
            }
            return this.x > canvas.width;
        }
        draw() {
            ctx.save(); 
            ctx.fillStyle = this.type === 'ice' ? '#3498db' : '#2ecc71';
            if (this.type === 'ice') ctx.shadowBlur = 8, ctx.shadowColor = '#aed6f1';
            ctx.beginPath();
            ctx.arc(this.x, this.y, Math.min(cellWidth, cellHeight) * 0.08, 0, Math.PI * 2); 
            ctx.fill();
            ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 2; ctx.stroke(); 
            ctx.restore();
        }
    }

    class SkySun {
        constructor() {
            this.radius = Math.min(cellWidth, cellHeight) * 0.25;
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = -this.radius;
            const targetRow = Math.floor(Math.random() * ROWS);
            this.targetY = targetRow * cellHeight + cellHeight / 2;
            this.speed = 0.08; 
        }
        update(deltaTime) {
            if (isPaused) return;
            if (this.y < this.targetY) { this.y += this.speed * deltaTime; if (this.y > this.targetY) this.y = this.targetY; }
        }
        draw() {
            ctx.save();
            if (imgSunFile.complete && imgSunFile.naturalWidth > 0) ctx.drawImage(imgSunFile, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
            else ctx.fillStyle = '#f1c40f', ctx.beginPath(), ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2), ctx.fill();
            ctx.restore();
        }
        checkClick(mx, my) { return Math.sqrt((mx - this.x) ** 2 + (my - this.y) ** 2) <= this.radius; }
    }

    let lastUiUpdateTime = 0;
    function updateCardsUI() {
        const now = Date.now();
        if (now - lastUiUpdateTime < 100 && gameState === 'playing') return; 
        lastUiUpdateTime = now;
        sunCountEl.textContent = Math.floor(sun);
        const prices = { peashooter: 100, icepeashooter: 175, sunflower: 50, wallnut: 50, chomper: 150, cherrybomb: 125, potatomine: 25 };
        for (let type in cardElements) {
            let card = cardElements[type];
            let cdOverlay = cdElements[type];
            let isNoSun = sun < prices[type];
            if (now < plantCooldownsEnd[type]) {
                let timeLeft = Math.ceil((plantCooldownsEnd[type] - now) / 1000);
                if (card) card.classList.add('cooldown-active', 'disabled');
                if (cdOverlay) cdOverlay.textContent = timeLeft;
            } else {
                if (card) card.classList.remove('cooldown-active');
                if (card) card.classList.toggle('disabled', isNoSun);
                if (cdOverlay) cdOverlay.textContent = "";
            }
        }
    }

    function updateZombieCounterUI() {
        if (!zombieCounterPanel) return;
        if (isInfiniteMode) zombieCounterPanel.innerHTML = `Побеждено: <span style='color:#fff;'>${Math.max(0, zombiesSpawnedSoFar - zombies.length)}</span> (∞)`;
        else {
            let remaining = totalZombiesInWave - zombiesSpawnedSoFar + zombies.length;
            zombieCounterPanel.innerHTML = `Осталось: <span style="color:#fff;">${Math.max(0, remaining)} / ${totalZombiesInWave}</span>`;
        }
    }

    function checkVictoryCondition() {
        if (isInfiniteMode) return; 
        if (zombiesSpawnedSoFar >= totalZombiesInWave && zombies.length === 0 && !gameOver) {
            gameState = 'victory_screen_active'; 
            victoryScreen.style.display = 'flex';
            setTimeout(() => { goToMenu(); }, 3000);
        }
    }

    function openWheelOfFortune(infinite) {
        isInfiniteMode = infinite;
        mainMenuScreen.style.display = 'none';
        if (infinite) {
            gameState = 'playing';
            resizeCanvas();
            restartGame();
            playPlayMusic();
        } else {
            fortuneScreen.style.display = 'flex';
            gameState = 'fortune';
            wheelAngle = 0; wheelSpeed = Math.random() * 0.3 + 0.4; isWheelSpinning = true;
            playPlayMusic();
        }
    }

    function drawWheel() {
        if (!wheelCtx) return;
        const numSlices = wheelNumbers.length; const sliceAngle = (Math.PI * 2) / numSlices;
        const centerX = wheelCanvas.width / 2; const centerY = wheelCanvas.height / 2;
        const radius = wheelCanvas.width / 2 - 15;
        wheelCtx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
        wheelCtx.save(); wheelCtx.translate(centerX, centerY); wheelCtx.rotate(wheelAngle);
        for (let i = 0; i < numSlices; i++) {
            wheelCtx.fillStyle = i % 2 === 0 ? (i % 4 === 0 ? '#1abc9c' : '#3498db') : (i % 3 === 0 ? '#9b59b6' : '#f1c40f');
            wheelCtx.beginPath(); wheelCtx.moveTo(0, 0); wheelCtx.arc(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle);
            wheelCtx.closePath(); wheelCtx.fill(); wheelCtx.lineWidth = 1.5; wheelCtx.strokeStyle = '#fff'; wheelCtx.stroke();
            wheelCtx.save();
            wheelCtx.fillStyle = (i % 2 !== 0 && i % 3 !== 0) ? '#2c3e50' : '#fff';
            wheelCtx.font = 'bold 14px Arial'; wheelCtx.textAlign = 'right'; wheelCtx.textBaseline = 'middle';
            wheelCtx.rotate(i * sliceAngle + sliceAngle / 2); wheelCtx.fillText(wheelNumbers[i], radius - 20, 0);
            wheelCtx.restore();
        }
        wheelCtx.restore();
        wheelCtx.beginPath(); wheelCtx.arc(centerX, centerY, 25, 0, Math.PI * 2); wheelCtx.fillStyle = '#ffffff';
        wheelCtx.shadowBlur = 6; wheelCtx.shadowColor = 'rgba(0,0,0,0.5)'; wheelCtx.fill();
    }

    function updateWheelPhysics() {
        if (!isWheelSpinning) return;
        wheelAngle += wheelSpeed; wheelSpeed *= 0.985; 
        if (wheelSpeed < 0.001) {
            isWheelSpinning = false; wheelSpeed = 0;
            const numSlices = wheelNumbers.length; const sliceAngle = (Math.PI * 2) / numSlices;
            let normalizedAngle = (Math.PI * 1.5 - wheelAngle) % (Math.PI * 2);
            if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
            const selectedIndex = Math.floor(normalizedAngle / sliceAngle) % numSlices;
            selectedZombiesCount = wheelNumbers[selectedIndex];
            setTimeout(() => {
                fortuneScreen.style.display = 'none';
                gameState = 'playing'; totalZombiesInWave = selectedZombiesCount;
                resizeCanvas();
                restartGame();
            }, 1500);
        }
    }

    function exitGame() {
        if (confirm("Вы хотите выйти из игры?")) window.close();
    }

    function goToMenu() {
        isPaused = false;
        pauseScreen.style.display = 'none';
        gameOverScreen.style.display = 'none'; victoryScreen.style.display = 'none';
        mainMenuScreen.style.display = 'flex';
        isShovelActive = false; if (shovelBtn) shovelBtn.classList.remove('active');
        gameState = 'menu'; initGrid(); zombies = []; peas = []; naturalSuns = []; explosions = []; poisonedCells = [];
        gargantuarSpawnCounter = 0;
        updateZombieCounterUI(); playMenuMusic();
    }

    function handleGameCanvasClick(clientX, clientY) {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        const clickX = clientX - rect.left;
        const clickY = clientY - rect.top;
        for (let i = naturalSuns.length - 1; i >= 0; i--) {
            if (naturalSuns[i].checkClick(clickX, clickY)) {
                sun += 25; naturalSuns.splice(i, 1); updateCardsUI();
                return;
            }
        }
        if (isShovelActive) {
            const c = Math.floor(clickX / cellWidth);
            const r = Math.floor(clickY / cellHeight);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r] && grid[r][c] !== null) {
                grid[r][c] = null;
                audioLopata.currentTime = 0;
                audioLopata.play().catch(err => console.log(err));
            }
            isShovelActive = false;
            if (shovelBtn) shovelBtn.classList.remove('active');
        }
    }

    canvas.addEventListener('click', (e) => handleGameCanvasClick(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        handleGameCanvasClick(touch.clientX, touch.clientY);
    });

    function handleDragStart(type, clientX, clientY) {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        if (isShovelActive) {
            isShovelActive = false;
            if (shovelBtn) shovelBtn.classList.remove('active');
        }
        if (Date.now() < plantCooldownsEnd[type]) {
            audioCooldownNotReady.currentTime = 0;
            audioCooldownNotReady.play().catch(err => console.log(err));
            return;
        }
        const prices = { peashooter: 100, icepeashooter: 175, sunflower: 50, wallnut: 50, chomper: 150, cherrybomb: 125, potatomine: 25 };
        if (sun < prices[type]) return;
        draggingPlantType = type;
        isDragging = true;
        handleDragMove(clientX, clientY);
    }

    function handleDragMove(clientX, clientY) {
        if (!isDragging || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        mousePos.x = clientX - rect.left;
        mousePos.y = clientY - rect.top;
    }

    function handleDragEnd(clientX, clientY) {
        if (!isDragging || isPaused) {
            isDragging = false;
            draggingPlantType = null;
            return;
        }
        const rect = canvas.getBoundingClientRect();
        const dropX = clientX - rect.left;
        const dropY = clientY - rect.top;
        const c = Math.floor(dropX / cellWidth);
        const r = Math.floor(dropY / cellHeight);
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && dropX >= 0 && dropX <= canvas.width && dropY >= 0 && dropY <= canvas.height && grid[r] && grid[r][c] === null) {
            const isPoisoned = poisonedCells.some(p => p.r === r && p.c === c);
            if (!isPoisoned) {
                const prices = { peashooter: 100, icepeashooter: 175, sunflower: 50, wallnut: 50, chomper: 150, cherrybomb: 125, potatomine: 25 };
                let cost = prices[draggingPlantType];
                if (sun >= cost && Date.now() >= plantCooldownsEnd[draggingPlantType]) {
                    sun -= cost;
                    grid[r][c] = new Plant(draggingPlantType, r, c);
                    plantCooldownsEnd[draggingPlantType] = Date.now() + plantCooldownsMax[draggingPlantType];
                    audioPosadka.currentTime = 0;
                    audioPosadka.play().catch(err => console.log(err));
                    updateCardsUI();
                }
            }
        }
        isDragging = false; 
        draggingPlantType = null; 
        updateCardsUI();
    }

    for (let type in cardElements) {
        let card = cardElements[type];
        if (card) {
            card.addEventListener('mousedown', (e) => { e.preventDefault(); handleDragStart(type, e.clientX, e.clientY); });
            card.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; handleDragStart(type, touch.clientX, touch.clientY); }, {passive: false});
        }
    }

    window.addEventListener('mousemove', (e) => {
        if (isDragging) handleDragMove(e.clientX, e.clientY);
        else if (isShovelActive) {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
        }
    });
    window.addEventListener('mouseup', (e) => handleDragEnd(e.clientX, e.clientY));
    
    window.addEventListener('touchmove', (e) => { 
        if (!isDragging && !isShovelActive) return; 
        e.preventDefault();
        const touch = e.touches[0]; 
        if (isDragging) handleDragMove(touch.clientX, touch.clientY);
    }, {passive: false});
    
    window.addEventListener('touchend', (e) => {
        if (isDragging) { 
            const touch = e.changedTouches[0]; 
            handleDragEnd(touch.clientX, touch.clientY); 
        } else if (isShovelActive) { 
            const touch = e.changedTouches[0]; 
            handleGameCanvasClick(touch.clientX, touch.clientY); 
        }
    });

    function drawGrid() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const isPoisoned = poisonedCells.some(p => p.r === r && p.c === c);
                ctx.fillStyle = isPoisoned ? '#4a6741' : ((r + c) % 2 === 0 ? '#4caf50' : '#388e3c');
                ctx.fillRect(c * cellWidth, r * cellHeight, cellWidth, cellHeight);
                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.strokeRect(c * cellWidth, r * cellHeight, cellWidth, cellHeight);
            }
        }
        let checkX = isDragging ? mousePos.x : (isShovelActive ? mousePos.x : -1);
        let checkY = isDragging ? mousePos.y : (isShovelActive ? mousePos.y : -1);
        if (checkX >= 0 && checkY >= 0 && !isPaused) {
            const hoverC = Math.floor(checkX / cellWidth);
            const hoverR = Math.floor(checkY / cellHeight);
            if (hoverR >= 0 && hoverR < ROWS && hoverC >= 0 && hoverC < COLS && !poisonedCells.some(p => p.r === hoverR && p.c === hoverC)) {
                ctx.save();
                ctx.strokeStyle = isShovelActive ? 'rgba(231, 76, 60, 0.8)' : 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 4;
                ctx.strokeRect(hoverC * cellWidth + 2, hoverR * cellHeight + 2, cellWidth - 4, cellHeight - 4);
                ctx.restore();
            }
        }
    }

    function endGame() { gameOver = true; gameOverScreen.style.display = 'flex'; }

    function restartGame() {
        initGrid(); zombies = []; peas = []; naturalSuns = []; explosions = []; poisonedCells = [];
        sun = 150; zombiesSpawnedSoFar = 0; isDragging = false; draggingPlantType = null; gameOver = false;
        isShovelActive = false; if (shovelBtn) shovelBtn.classList.remove('active');
        isPaused = false; pauseOffsetTotal = 0;
        pauseScreen.style.display = 'none';
        gameStartTime = Date.now(); lastZombieSpawnTime = Date.now() + START_DELAY; 
        zombieSpawnInterval = getRandomSpawnInterval(); lastSkySunSpawnTime = Date.now(); skySunSpawnInterval = getRandomSkySunInterval();
        gameOverScreen.style.display = 'none'; victoryScreen.style.display = 'none';
        gargantuarSpawnCounter = 0;
        const now = Date.now();
        plantCooldownsEnd.sunflower = now + 2000;
        plantCooldownsEnd.peashooter = now + 3000;
        plantCooldownsEnd.icepeashooter = now + 3000;
        plantCooldownsEnd.wallnut = now + 4000;
        plantCooldownsEnd.chomper = now + 5000;
        plantCooldownsEnd.cherrybomb = now + 6000;
        plantCooldownsEnd.potatomine = now + 4000;
        updateCardsUI(); updateZombieCounterUI();
        if (!isInfiniteMode) {
            setTimeout(() => {
                if (gameState === 'playing' && !gameOver && !isSummoningInProgress) {
                    isSummoningInProgress = true;
                    zombies.push(new Zombie(Math.floor(Math.random() * ROWS), 'gargantuar'));
                    updateZombieCounterUI();
                    setTimeout(() => { isSummoningInProgress = false; }, 100);
                }
            }, 5000);
        }
    }

    let lastTime = Date.now();
    let frameCount = 0;

    function gameLoop() {
        const now = Date.now(); 
        let deltaTime = Math.min(now - lastTime, 50); 
        lastTime = now;
        if (isPaused) deltaTime = 0;
        
        if (gameState === 'fortune') { updateWheelPhysics(); drawWheel(); }
        
        if (gameState === 'playing' && !gameOver && !isPaused) {
            let actualGameTime = now - pauseOffsetTotal;
            if (actualGameTime - gameStartTime >= START_DELAY) {
                let shouldSpawn = isInfiniteMode ? (now - lastZombieSpawnTime >= zombieSpawnInterval) : (zombiesSpawnedSoFar < totalZombiesInWave && (now - lastZombieSpawnTime >= zombieSpawnInterval));
                if (shouldSpawn && !isSummoningInProgress) {
                    let rand = Math.random();
                    let zombieType = 'normal';
                    if (rand < 0.15) zombieType = 'bucket';
                    else if (rand < 0.4) zombieType = 'cone';
                    zombies.push(new Zombie(Math.floor(Math.random() * ROWS), zombieType));
                    zombiesSpawnedSoFar++; 
                    lastZombieSpawnTime = now;
                    zombieSpawnInterval = getRandomSpawnInterval(); 
                    if (isInfiniteMode) {
                        gargantuarSpawnCounter++;
                        if (gargantuarSpawnCounter >= 20 && !isSummoningInProgress) {
                            isSummoningInProgress = true;
                            zombies.push(new Zombie(Math.floor(Math.random() * ROWS), 'gargantuar'));
                            gargantuarSpawnCounter = 0;
                            setTimeout(() => { isSummoningInProgress = false; }, 100);
                        }
                    }
                    updateZombieCounterUI();
                }
            }
            if (now - lastSkySunSpawnTime >= skySunSpawnInterval) {
                naturalSuns.push(new SkySun()); lastSkySunSpawnTime = now;
                skySunSpawnInterval = getRandomSkySunInterval();
            }
            for (let r = 0; r < ROWS; r++) {
                if (grid[r]) {
                    for (let c = 0; c < COLS; c++) { if (grid[r][c]) grid[r][c].update(now); }
                }
            }
            for (let i = 0; i < zombies.length; i++) zombies[i].update(now, deltaTime);
            for (let i = peas.length - 1; i >= 0; i--) { if (peas[i].update(deltaTime)) peas.splice(i, 1); }
            for (let i = 0; i < naturalSuns.length; i++) naturalSuns[i].update(deltaTime);
            updateCardsUI();
        }
        
        if (gameState === 'playing' || gameState === 'victory_screen_active') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            for (let r = 0; r < ROWS; r++) if (grid[r]) for (let c = 0; c < COLS; c++) if (grid[r][c]) grid[r][c].draw();
            for (let i = 0; i < peas.length; i++) peas[i].draw();
            for (let i = 0; i < zombies.length; i++) zombies[i].draw();
            for (let i = 0; i < naturalSuns.length; i++) naturalSuns[i].draw();
            ctx.save();
            for (let i = explosions.length - 1; i >= 0; i--) {
                let exp = explosions[i];
                if (isPaused) exp.endTime += deltaTime; 
                if (now > exp.endTime) { explosions.splice(i, 1); continue; }
                if (imgBoom.complete && imgBoom.naturalWidth > 0) ctx.drawImage(imgBoom, exp.x, exp.y, exp.w, exp.h);
                else { let timeLeft = exp.endTime - now; ctx.globalAlpha = timeLeft / 500; ctx.fillStyle = 'rgba(231, 76, 60, 0.7)'; ctx.fillRect(exp.x, exp.y, exp.w, exp.h); }
            }
            ctx.restore();
            if (!gameOver && gameState === 'playing') {
                let timePassed = (now - pauseOffsetTotal) - gameStartTime;
                if (timePassed < START_DELAY) {
                    let timeLeft = Math.ceil((START_DELAY - timePassed) / 1000);
                    ctx.save(); ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(10, 10, 280, 35);
                    ctx.fillStyle = '#2ecc71'; ctx.font = 'bold 16px Arial';
                    ctx.fillText(`Нападение через: ${timeLeft} сек`, 20, 32); ctx.restore();
                }
            }
            if (isDragging && mousePos.x >= 0 && mousePos.y >= 0 && !isPaused && draggingPlantType) {
                const tempPlant = new Plant(draggingPlantType, 0, 0);
                tempPlant.draw(mousePos.x, mousePos.y, 0.6);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    setTimeout(() => { resizeCanvas(); }, 100);
    initGrid(); 
    updateCardsUI(); 
    gameLoop();
</script>
</body>
</html>
