<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Plants vs. Budget Lack</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #111;
        }

        /* --- ЭКРАН ЗАГРУЗКИ --- */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            background-image: linear-gradient(135deg, #111827, #0b0f19);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: white;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        #loading-title {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 2px;
            color: #2ecc71;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            text-align: center;
        }

        #loading-sub {
            font-size: clamp(12px, 3vw, 16px);
            color: #8892b0;
            margin-bottom: 30px;
            text-align: center;
        }

        .progress-container {
            width: min(100%, 300px);
            height: 14px;
            background-color: #1e293b;
            border-radius: 10px;
            padding: 2px;
            border: 2px solid #334155;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.6);
            transition: width 0.05s linear;
        }

        #start-action-btn {
            display: none;
            padding: 15px 40px;
            font-size: clamp(18px, 4vw, 24px);
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: 3px solid #b33939;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(230, 126, 34, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(230, 126, 34, 0.5); }
            50% { transform: scale(1.04); box-shadow: 0 0 30px rgba(230, 126, 34, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(230, 126, 34, 0.5); }
        }

        /* --- ГЛАВНОЕ МЕНЮ --- */
        #main-menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(44, 62, 80, 0.8), rgba(44, 62, 80, 0.8)), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%231e3d22"/><path d="M0,100 Q25,50 50,100 T100,100" fill="%23142e18" opacity="0.3"/></svg>');
            background-size: cover;
            background-position: center;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            gap: 20px;
            padding: 20px;
        }

        .menu-btn {
            padding: 15px 30px;
            font-size: clamp(18px, 4vw, 26px);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: 4px solid #1e8449;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, background 0.2s;
            width: min(100%, 380px);
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, #2fdd79, #2ecc71);
            transform: scale(1.02);
        }
        .menu-btn:active { transform: scale(0.98); }

        .menu-btn.exit {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-color: #962d22;
        }

        /* РУЛЕТКА */
        #fortune-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 30, 40, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            color: white;
            padding: 20px;
        }

        #wheel-title {
            font-size: clamp(20px, 5vw, 36px);
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            color: #f1c40f;
            text-align: center;
        }

        #wheel-container {
            position: relative;
            width: min(85vw, 400px);
            height: min(85vw, 400px);
        }

        #wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 18;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        #wheelCanvas {
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            width: 100% !important;
            height: 100% !important;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #top-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border-bottom: 4px solid #d35400;
            padding: 5px 15px;
            width: 100%;
            height: 50px;
            color: #fff;
            font-weight: bold;
            font-size: clamp(16px, 4vw, 24px);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .panel-section { display: flex; align-items: center; }
        #sun-icon { font-size: clamp(20px, 5vw, 28px); margin-right: 8px; display: inline-block; animation: spin 8s linear infinite; }
        #zombie-counter-panel { font-size: clamp(12px, 3.5vw, 20px) !important; }

        /* ИГРОВОЙ ХОЛСТ */
        #canvas-wrapper {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #144218;
            overflow: hidden;
        }

        #gameCanvas {
            background-color: #1a5e20;
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        #bottom-container {
            background-color: #2c3e50;
            border-top: 4px solid #34495e;
            padding: 10px;
            width: 100%;
            height: clamp(85px, 15vh, 120px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 5;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
            gap: 10px;
        }

        #cards-container { 
            display: flex; 
            gap: clamp(4px, 1vw, 10px); 
            align-items: center; 
            flex-grow: 1;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        #cards-container::-webkit-scrollbar { display: none; }

        .card {
            position: relative;
            width: clamp(65px, 12vw, 110px);
            height: clamp(65px, 12vh, 95px);
            flex-shrink: 0;
            background: #ecf0f1;
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: grab;
            font-weight: bold;
            font-size: clamp(9px, 1.5vw, 13px);
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s, opacity 0.2s, transform 0.1s;
            color: #2c3e50;
            overflow: hidden;
            line-height: 1.1;
        }
        
        .card-cooldown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: clamp(16px, 3vw, 24px);
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s ease;
        }
        
        .card.cooldown-active .card-cooldown-overlay { opacity: 1; }
        .card.disabled {
            background-color: #95a5a6 !important;
            border-color: #7f8c8d !important;
            color: #7f8c8d;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .card .cost { font-size: clamp(9px, 1.5vw, 13px); color: #d35400; margin-top: 2px; }

        /* ЛОПАТА */
        .shovel-btn {
            width: clamp(65px, 12vw, 95px);
            height: clamp(65px, 12vh, 95px);
            flex-shrink: 0;
            background: linear-gradient(135deg, #7f8c8d, #95a5a6);
            border: 3px solid #7f8c8d;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(24px, 4vw, 36px);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
        }
        .shovel-btn.active {
            border-color: #e74c3c;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            animation: pulse-shovel 1s infinite;
        }

        .right-buttons {
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: center;
            flex-shrink: 0;
        }

        .cheat-btn, .pause-btn {
            padding: clamp(6px, 1.5vh, 12px) clamp(10px, 2vw, 20px);
            font-size: clamp(10px, 1.8vw, 15px);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border: 2px solid #6c3483;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s, background 0.2s;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        
        .pause-btn {
            background: linear-gradient(135deg, #f39c12, #d35400);
            border-color: #a04000;
        }

        #game-over-screen, #victory-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: bold;
            z-index: 10;
            padding: 20px;
        }
        #game-over-screen { color: #e74c3c; }
        #victory-screen { color: #2ecc71; }
        #victory-subtext { font-size: clamp(16px, 4vw, 28px); color: #fff; margin-top: 15px; font-weight: normal; }

        .restart-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: clamp(16px, 3vw, 24px);
            background-color: #34495e;
            color: white;
            border: 3px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* МЕНЮ ПАУЗЫ */
        #pause-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            padding: 20px;
        }

        .pause-dialog {
            background: #2c3e50;
            border: 4px solid #f1c40f;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            width: min(100%, 320px);
        }

        .pause-title {
            color: #fff;
            font-size: clamp(24px, 5vw, 36px);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 5px;
        }

        .pause-menu-btn {
            width: 100%;
            padding: 12px 20px;
            font-size: clamp(16px, 3.5vw, 22px);
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: 3px solid #1e8449;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .pause-menu-btn.exit { background: linear-gradient(135deg, #e74c3c, #c0392b); border-color: #962d22; }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="loading-screen">
        <div id="loading-title">ЗАГРУЗКА ИГРЫ...</div>
        <div id="loading-sub">Подготовка текстур и звуков</div>
        <div class="progress-container">
            <div id="main-progress-bar" class="progress-bar"></div>
        </div>
        <button id="start-action-btn">КЛИК ДЛЯ СТАРТА</button>
    </div>

    <div id="main-menu-screen">
        <button class="menu-btn" onclick="openWheelOfFortune(false)">ОБЫЧНЫЙ РЕЖИМ</button>
        <button class="menu-btn" onclick="openWheelOfFortune(true)" style="background: linear-gradient(135deg, #9b59b6, #8e44ad); border-color: #6c3483;">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
        <button class="menu-btn exit" onclick="exitGame()">ВЫХОД</button>
    </div>

    <div id="fortune-screen">
        <div id="wheel-title">Определение размера волны зомби...</div>
        <div id="wheel-container">
            <div id="wheel-pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
    </div>

    <div id="pause-screen">
        <div class="pause-dialog">
            <div class="pause-title">ПАУЗА</div>
            <button class="pause-menu-btn" onclick="resumeGame()">ПРОДОЛЖИТЬ</button>
            <button class="pause-menu-btn exit" onclick="goToMenu()">ВЫХОД</button>
        </div>
    </div>

    <div id="top-panel">
        <div class="panel-section">
            <span id="sun-icon">☀️</span> <span id="sun-count">150</span>
        </div>
        <div class="panel-section" id="zombie-counter-panel">
            Осталось зомби: <span id="zombies-left-count">0</span> / <span id="zombies-total-count">0</span>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bottom-container">
        <div id="cards-container">
            <div class="card" id="card-peashooter">
                Горохострел
                <div class="cost">☀️ 100</div>
                <div class="card-cooldown-overlay" id="cd-peashooter">0</div>
            </div>
            <div class="card" id="card-sunflower">
                Подсолнух
                <div class="cost">☀️ 50</div>
                <div class="card-cooldown-overlay" id="cd-sunflower">0</div>
            </div>
            <div class="card" id="card-wallnut">
                Орех
                <div class="cost">☀️ 50</div>
                <div class="card-cooldown-overlay" id="cd-wallnut">0</div>
            </div>
            <div class="card" id="card-cherrybomb">
                Вишня
                <div class="cost">☀️ 125</div>
                <div class="card-cooldown-overlay" id="cd-cherrybomb">0</div>
            </div>
            <div class="card" id="card-potatomine">
                Картоф. мина
                <div class="cost">☀️ 25</div>
                <div class="card-cooldown-overlay" id="cd-potatomine">0</div>
            </div>

            <div class="shovel-btn" id="shovel-btn" onclick="toggleShovel()" title="Выкопать растение">
                🪓
            </div>
        </div>

        <div class="right-buttons">
            <button class="cheat-btn" id="cheat-kill-btn" onclick="triggerCheatMassKill()">💥 1 Зомби</button>
            <button class="pause-btn" onclick="pauseGame()">⏸️ ПАУЗА</button>
        </div>
    </div>

    <div id="game-over-screen">
        <div>ПОРАЖЕНИЕ!</div>
        <button class="restart-btn" onclick="goToMenu()">В меню</button>
    </div>

    <div id="victory-screen">
        <div>УРОВЕНЬ ПРОЙДЕН!</div>
        <div id="victory-subtext">Возвращение в меню...</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const sunCountEl = document.getElementById('sun-count');
    const shovelBtn = document.getElementById('shovel-btn');
    const canvasWrapper = document.getElementById('canvas-wrapper');
    
    const cardElements = {
        peashooter: document.getElementById('card-peashooter'),
        sunflower: document.getElementById('card-sunflower'),
        wallnut: document.getElementById('card-wallnut'),
        cherrybomb: document.getElementById('card-cherrybomb'),
        potatomine: document.getElementById('card-potatomine')
    };

    const cdElements = {
        peashooter: document.getElementById('cd-peashooter'),
        sunflower: document.getElementById('cd-sunflower'),
        wallnut: document.getElementById('cd-wallnut'),
        cherrybomb: document.getElementById('cd-cherrybomb'),
        potatomine: document.getElementById('cd-potatomine')
    };

    const plantCooldownsMax = {
        peashooter: 7000,
        sunflower: 7000,
        wallnut: 25000,
        cherrybomb: 35000,
        potatomine: 30000
    };

    let plantCooldownsEnd = { peashooter: 0, sunflower: 0, wallnut: 0, cherrybomb: 0, potatomine: 0 };

    const gameOverScreen = document.getElementById('game-over-screen');
    const victoryScreen = document.getElementById('victory-screen');
    const mainMenuScreen = document.getElementById('main-menu-screen');
    const fortuneScreen = document.getElementById('fortune-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const zombieCounterPanel = document.getElementById('zombie-counter-panel');
    const cheatKillBtn = document.getElementById('cheat-kill-btn');
    
    const zombiesLeftEl = document.getElementById('zombies-left-count');
    const zombiesTotalEl = document.getElementById('zombies-total-count');

    const wheelCanvas = document.getElementById('wheelCanvas');
    const wheelCtx = wheelCanvas.getContext('2d');
    
    const loadingScreen = document.getElementById('loading-screen');
    const progressBar = document.getElementById('main-progress-bar');
    const startActionBtn = document.getElementById('start-action-btn');
    const loadingTitle = document.getElementById('loading-title');
    const loadingSub = document.getElementById('loading-sub');

    const wheelNumbers = [];
    for(let i = 20; i <= 50; i++) wheelNumbers.push(i);
    
    let wheelAngle = 0;
    let wheelSpeed = 0;
    let isWheelSpinning = false;
    let selectedZombiesCount = 30;

    let isInfiniteMode = false;
    let isPaused = false;
    let savedPauseTime = 0; 
    let pauseOffsetTotal = 0; 

    // --- АУДИОЗАГЛУШКИ ДЛЯСТАБИЛЬНОСТИБЕЗ ФАЙЛОВ ---
    const audioMenu = { play: function(){ return Promise.resolve(); }, pause: function(){} };
    const audioPlay = { play: function(){ return Promise.resolve(); }, pause: function(){} };
    const audioPosadka = { play: function(){ return Promise.resolve(); }, currentTime: 0 };
    const audioCooldownNotReady = { play: function(){ return Promise.resolve(); }, currentTime: 0 };
    const audioLopata = { play: function(){ return Promise.resolve(); }, currentTime: 0 };

    function playMenuMusic() {}
    function playPlayMusic() {}

    // --- ЗАГРУЗКА ---
    let progress = 0;
    let loadInterval = setInterval(() => {
        progress += Math.random() * 8 + 4;
        if (progress >= 100) {
            progress = 100;
            clearInterval(loadInterval);
            loadingTitle.textContent = "ЗАГРУЗКА ЗАВЕРШЕНА!";
            loadingSub.textContent = "Всё готово к защите вашего сада";
            progressBar.style.width = "100%";
            startActionBtn.style.display = "block";
        } else {
            progressBar.style.width = progress + "%";
        }
    }, 40);

    startActionBtn.addEventListener('click', () => {
        loadingScreen.style.opacity = '0';
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
        gameState = 'menu';
        playMenuMusic();
    });

    let isSunFileImgLoaded = true;

    // Сетка
    let cellWidth = 80; let cellHeight = 80; let spriteSize = 80; 
    const COLS = 10; const ROWS = 5;
    const GAME_ASPECT = 16 / 9;

    let gameState = 'loading'; 
    let sun = 150;
    let grid = []; let zombies = []; let peas = []; let naturalSuns = []; let explosions = []; 
    let gameOver = false;

    let totalZombiesInWave = 0; let zombiesSpawnedSoFar = 0;
    const START_DELAY = 20000; 
    let gameStartTime = 0; let lastZombieSpawnTime = 0;
    let zombieSpawnInterval = getRandomSpawnInterval();
    let lastSkySunSpawnTime = 0; let skySunSpawnInterval = getRandomSkySunInterval();

    let draggingPlantType = null;
    let mousePos = { x: -1, y: -1 };
    let isDragging = false;
    let isShovelActive = false;

    function resizeCanvas() {
        const wrapperWidth = canvasWrapper.clientWidth;
        const wrapperHeight = canvasWrapper.clientHeight;
        
        if (wrapperWidth / wrapperHeight > GAME_ASPECT) {
            canvas.height = wrapperHeight;
            canvas.width = wrapperHeight * GAME_ASPECT;
        } else {
            canvas.width = wrapperWidth;
            canvas.height = wrapperWidth / GAME_ASPECT;
        }

        cellWidth = canvas.width / COLS;
        cellHeight = canvas.height / ROWS;
        spriteSize = cellHeight * 0.85; 
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

    function initGrid() {
        grid = [];
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++) grid[r][c] = null;
        }
    }

    function getRandomSpawnInterval() { return Math.random() * (5000 - 3000) + 3000; }
    function getRandomSkySunInterval() { return Math.random() * (15000 - 8000) + 8000; }

    function triggerCheatMassKill() {
        if (gameState !== 'playing' || gameOver || zombies.length <= 1 || isPaused) return;
        const luckyZombie = zombies[Math.floor(Math.random() * zombies.length)];
        zombies = [luckyZombie];
        if (!isInfiniteMode) {
            zombiesSpawnedSoFar = totalZombiesInWave;
        }
        updateZombieCounterUI();
    }

    function toggleShovel() {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        isShovelActive = !isShovelActive;
        if (isShovelActive) {
            isDragging = false;
            draggingPlantType = null;
            shovelBtn.classList.add('active');
        } else {
            shovelBtn.classList.remove('active');
        }
    }

    function pauseGame() {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        isPaused = true;
        savedPauseTime = Date.now();
        pauseScreen.style.display = 'flex';
    }

    function resumeGame() {
        if (!isPaused) return;
        isPaused = false;
        let pausedDuration = Date.now() - savedPauseTime;
        pauseOffsetTotal += pausedDuration;
        
        for (let type in plantCooldownsEnd) {
            if (plantCooldownsEnd[type] > savedPauseTime) {
                plantCooldownsEnd[type] += pausedDuration;
            }
        }
        
        pauseScreen.style.display = 'none';
    }

    class Plant {
        constructor(type, r, c) {
            this.type = type; this.r = r; this.c = c;
            this.lastActionTime = Date.now();
            this.birthTime = Date.now(); 
            
            if (type === 'peashooter') { this.actionInterval = 3000; this.hp = 10000; }
            else if (type === 'sunflower') { this.actionInterval = 8000; this.hp = 10000; }
            else if (type === 'wallnut') { this.actionInterval = 0; this.hp = 50000; }
            else if (type === 'cherrybomb') { this.actionInterval = 2000; this.hp = 999999; }
            else if (type === 'potatomine') { 
                this.actionInterval = 10000; 
                this.hp = 500;              
                this.isReady = false;        
            }
        }

        update(now) {
            if (isPaused) return;
            let currentX = this.c * cellWidth;
            
            if (this.type === 'peashooter' && now - this.lastActionTime >= this.actionInterval) {
                const hasZombieInRow = zombies.some(z => z.r === this.r && z.x >= currentX);
                if (hasZombieInRow) {
                    peas.push(new Pea(currentX + cellWidth/2 + spriteSize/2, this.r * cellHeight + cellHeight / 2, this.r));
                    this.lastActionTime = now;
                }
            } else if (this.type === 'sunflower' && now - this.lastActionTime >= this.actionInterval) {
                sun += 25;
                this.lastActionTime = now;
            } else if (this.type === 'cherrybomb' && now - this.birthTime >= this.actionInterval) {
                this.explodeCherry();
            } else if (this.type === 'potatomine' && !this.isReady) {
                if (now - this.birthTime >= this.actionInterval) {
                    this.isReady = true;
                }
            }
        }

        explodeCherry() {
            const minR = Math.max(0, this.r - 2); const maxR = Math.min(ROWS - 1, this.r + 2);
            const minC = Math.max(0, this.c - 2); const maxC = Math.min(COLS - 1, this.c + 2);
            const minX = minC * cellWidth; const maxX = (maxC + 1) * cellWidth;

            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                let zCenterX = z.x + (cellWidth / 2);
                if (z.r >= minR && z.r <= maxR && zCenterX >= minX && zCenterX <= maxX) {
                    zombies.splice(i, 1);
                }
            }

            explosions.push({
                x: minX, y: minR * cellHeight, w: maxX - minX, h: (maxR - minR + 1) * cellHeight,
                endTime: Date.now() + 500 
            });

            grid[this.r][this.c] = null;
            updateZombieCounterUI();
            checkVictoryCondition();
        }

        explodeMine() {
            const minR = Math.max(0, this.r - 1); const maxR = Math.min(ROWS - 1, this.r + 1);
            const minC = Math.max(0, this.c - 1); const maxC = Math.min(COLS - 1, this.c + 1);
            const minX = minC * cellWidth; const maxX = (maxC + 1) * cellWidth;

            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                let zCenterX = z.x + (cellWidth / 2);
                if (z.r >= minR && z.r <= maxR && zCenterX >= minX && zCenterX <= maxX) {
                    zombies.splice(i, 1);
                }
            }

            explosions.push({
                x: minX, y: minR * cellHeight, w: maxX - minX, h: (maxR - minR + 1) * cellHeight,
                endTime: Date.now() + 500
            });

            grid[this.r][this.c] = null; 
            zombies.forEach(z => { z.isEating = false; });

            updateZombieCounterUI();
            checkVictoryCondition();
        }

        draw(customX = null, customY = null, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            let cellCenterX = (this.c * cellWidth) + (cellWidth / 2);
            let cellCenterY = (this.r * cellHeight) + (cellHeight / 2);
            let drawX = customX !== null ? customX - spriteSize/2 : cellCenterX - spriteSize/2;
            let drawY = customY !== null ? customY - spriteSize/2 : cellCenterY - spriteSize/2;

            let img = imgPeashooter; let isLoaded = false; let fallbackColor = '#fff';

            if (this.type === 'peashooter') { img = imgPeashooter; isLoaded = isPeashooterImgLoaded; fallbackColor = '#2ecc71'; }
            else if (this.type === 'sunflower') { img = imgSunflower; isLoaded = isSunflowerImgLoaded; fallbackColor = '#f1c40f'; }
            else if (this.type === 'wallnut') { img = imgWallnut; isLoaded = isWallnutImgLoaded; fallbackColor = '#d35400'; }
            else if (this.type === 'cherrybomb') { img = imgCherry; isLoaded = isCherryImgLoaded; fallbackColor = '#e74c3c'; }
            else if (this.type === 'potatomine') {
                if (customX !== null) {
                    img = imgMineReady; isLoaded = isMineReadyLoaded; fallbackColor = '#e67e22';
                } else {
                    img = this.isReady ? imgMineReady : imgMineUnder;
                    isLoaded = this.isReady ? isMineReadyLoaded : isMineUnderLoaded;
                    fallbackColor = this.isReady ? '#e67e22' : '#795548';
                }
            }

            if (isLoaded) { ctx.drawImage(img, drawX, drawY, spriteSize, spriteSize); }
            else { ctx.fillStyle = fallbackColor; ctx.fillRect(drawX, drawY, spriteSize, spriteSize); }
            ctx.restore();
        }
    }

    class Zombie {
        constructor(r, type = 'normal') {
            this.r = r; this.x = canvas.width; 
            this.speed = cellWidth / 7000; 
            this.isEating = false;
            this.type = type;

            if (this.type === 'bucket') { this.hp = 12; } 
            else if (this.type === 'cone') { this.hp = 8; } 
            else { this.hp = 4; }
        }
        update(now, deltaTime) {
            if (isPaused) return;
            if (this.x <= 0) { endGame(); return; }
            let frontX = this.x + (cellWidth / 2) - (spriteSize / 4);
            let currentCellC = Math.floor(frontX / cellWidth);
            let nextCellC = currentCellC - 1;

            if (nextCellC >= 0 && nextCellC < COLS) {
                let plantAhead = grid[this.r][nextCellC];
                let plantBarrierX = (nextCellC + 1) * cellWidth;

                if (plantAhead && frontX <= plantBarrierX + 4) {
                    if (plantAhead.type === 'potatomine') {
                        if (plantAhead.isReady) {
                            this.isEating = false;
                            plantAhead.explodeMine();
                            return;
                        } else {
                            this.isEating = true;
                            plantAhead.hp -= deltaTime;
                            if (plantAhead.hp <= 0) { grid[this.r][nextCellC] = null; this.isEating = false; }
                            return;
                        }
                    }

                    this.isEating = true;
                    plantAhead.hp -= deltaTime; 
                    if (plantAhead.hp <= 0) { grid[this.r][nextCellC] = null; this.isEating = false; }
                    return; 
                }
            }
            this.isEating = false;
            this.x -= this.speed * deltaTime;
        }
        draw() {
            ctx.save();
            let cellCenterY = (this.r * cellHeight) + (cellHeight / 2);
            let drawY = cellCenterY - spriteSize / 2;
            let drawX = this.x + (cellWidth / 2) - (spriteSize / 2);
            
            if (this.type === 'bucket') {
                if (isZombieBucketLoaded) { ctx.drawImage(imgZombieBucket, drawX, drawY, spriteSize, spriteSize); } 
                else { ctx.fillStyle = '#34495e'; ctx.fillRect(drawX, drawY, spriteSize, spriteSize); }
            } else if (this.type === 'cone') {
                if (isZombieConeLoaded) { ctx.drawImage(imgZombieCone, drawX, drawY, spriteSize, spriteSize); } 
                else { ctx.fillStyle = '#e67e22'; ctx.fillRect(drawX, drawY, spriteSize, spriteSize); }
            } else {
                if (isZombieImgLoaded) { ctx.drawImage(imgZombie, drawX, drawY, spriteSize, spriteSize); } 
                else { ctx.fillStyle = '#7f8c8d'; ctx.fillRect(drawX, drawY, spriteSize, spriteSize); }
            }
            ctx.restore();
        }
    }

    class Pea {
        constructor(x, y, r) { this.x = x; this.y = y; this.r = r; this.speed = cellWidth * 0.004; }
        update(deltaTime) {
            if (isPaused) return false;
            this.x += this.speed * deltaTime;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                let zCenterX = z.x + (cellWidth / 2);
                if (z.r === this.r && this.x >= zCenterX - spriteSize/2 && this.x <= zCenterX + spriteSize/2) {
                    z.hp--; 

                    if ((z.type === 'bucket' || z.type === 'cone') && z.hp <= 4) {
                        z.type = 'normal';
                    }

                    if (z.hp <= 0) { 
                        zombies.splice(i, 1); 
                        updateZombieCounterUI(); 
                        checkVictoryCondition(); 
                    }
                    return true; 
                }
            }
            return this.x > canvas.width;
        }
        draw() {
            ctx.save(); ctx.fillStyle = '#2ecc71'; ctx.beginPath();
            ctx.arc(this.x, this.y, cellHeight * 0.08, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();
        }
    }

    class SkySun {
        constructor() {
            this.radius = cellHeight * 0.25;
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = -this.radius;
            const targetRow = Math.floor(Math.random() * ROWS);
            this.targetY = targetRow * cellHeight + cellHeight / 2;
            this.speed = 0.09; 
        }
        update(deltaTime) {
            if (isPaused) return;
            if (this.y < this.targetY) {
                this.y += this.speed * deltaTime;
                if (this.y > this.targetY) this.y = this.targetY;
            }
        }
        draw() {
            ctx.save();
            if (isSunFileImgLoaded) { ctx.drawImage(imgSunFile, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2); }
            else { ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); }
            ctx.restore();
        }
        checkClick(mx, my) { return Math.sqrt((mx - this.x) ** 2 + (my - this.y) ** 2) <= this.radius; }
    }

    function updateCardsUI() {
        const now = Date.now();
        sunCountEl.textContent = Math.floor(sun);
        const prices = { peashooter: 100, sunflower: 50, wallnut: 50, cherrybomb: 125, potatomine: 25 };

        for (let type in cardElements) {
            let card = cardElements[type];
            let cdOverlay = cdElements[type];
            let isNoSun = sun < prices[type];
            
            if (now < plantCooldownsEnd[type]) {
                let timeLeft = Math.ceil((plantCooldownsEnd[type] - now) / 1000);
                card.classList.add('cooldown-active');
                card.classList.add('disabled');
                cdOverlay.textContent = timeLeft;
            } else {
                card.classList.remove('cooldown-active');
                card.classList.toggle('disabled', isNoSun);
                cdOverlay.textContent = "";
            }
        }
    }

    function updateZombieCounterUI() {
        if (isInfiniteMode) {
            zombieCounterPanel.innerHTML = `Побеждено: <span style='color:#fff;'>${zombiesSpawnedSoFar - zombies.length}</span> (∞)`;
        } else {
            let remaining = totalZombiesInWave - zombiesSpawnedSoFar + zombies.length;
            zombieCounterPanel.innerHTML = `Осталось: <span style="color:#fff;">${remaining} / ${totalZombiesInWave}</span>`;
        }
    }

    function checkVictoryCondition() {
        if (isInfiniteMode) return; 
        if (zombiesSpawnedSoFar >= totalZombiesInWave && zombies.length === 0 && !gameOver) {
            gameState = 'victory_screen_active'; 
            victoryScreen.style.display = 'flex';
            setTimeout(() => { goToMenu(); }, 3000);
        }
    }

    function openWheelOfFortune(infinite) {
        isInfiniteMode = infinite;
        mainMenuScreen.style.display = 'none';
        
        if (isInfiniteMode) {
            cheatKillBtn.style.display = 'none'; 
            gameState = 'playing';
            resizeCanvas();
            restartGame();
        } else {
            cheatKillBtn.style.display = 'block';
            fortuneScreen.style.display = 'flex';
            gameState = 'fortune';
            wheelAngle = 0; wheelSpeed = Math.random() * 0.3 + 0.4; isWheelSpinning = true;
        }
    }

    function drawWheel() {
        const numSlices = wheelNumbers.length; const sliceAngle = (Math.PI * 2) / numSlices;
        const centerX = wheelCanvas.width / 2; const centerY = wheelCanvas.height / 2;
        const radius = wheelCanvas.width / 2 - 15;
        wheelCtx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
        wheelCtx.save(); wheelCtx.translate(centerX, centerY); wheelCtx.rotate(wheelAngle);

        for (let i = 0; i < numSlices; i++) {
            wheelCtx.fillStyle = i % 2 === 0 ? (i % 4 === 0 ? '#1abc9c' : '#3498db') : (i % 3 === 0 ? '#9b59b6' : '#f1c40f');
            wheelCtx.beginPath(); wheelCtx.moveTo(0, 0); wheelCtx.arc(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle);
            wheelCtx.closePath(); wheelCtx.fill(); wheelCtx.lineWidth = 1.5; wheelCtx.strokeStyle = '#fff'; wheelCtx.stroke();
            wheelCtx.save();
            wheelCtx.fillStyle = (i % 2 !== 0 && i % 3 !== 0) ? '#2c3e50' : '#fff';
            wheelCtx.font = 'bold 14px Arial'; wheelCtx.textAlign = 'right'; wheelCtx.textBaseline = 'middle';
            wheelCtx.rotate(i * sliceAngle + sliceAngle / 2); wheelCtx.fillText(wheelNumbers[i], radius - 20, 0);
            wheelCtx.restore();
        }
        wheelCtx.restore();
        wheelCtx.beginPath(); wheelCtx.arc(centerX, centerY, 25, 0, Math.PI * 2); wheelCtx.fillStyle = '#ffffff';
        wheelCtx.shadowBlur = 6; wheelCtx.shadowColor = 'rgba(0,0,0,0.5)'; wheelCtx.fill();
    }

    function updateWheelPhysics() {
        if (!isWheelSpinning) return;
        wheelAngle += wheelSpeed; wheelSpeed *= 0.985; 

        if (wheelSpeed < 0.001) {
            isWheelSpinning = false; wheelSpeed = 0;
            const numSlices = wheelNumbers.length; const sliceAngle = (Math.PI * 2) / numSlices;
            let normalizedAngle = (Math.PI * 1.5 - wheelAngle) % (Math.PI * 2);
            if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
            const selectedIndex = Math.floor(normalizedAngle / sliceAngle) % numSlices;
            selectedZombiesCount = wheelNumbers[selectedIndex];

            setTimeout(() => {
                fortuneScreen.style.display = 'none';
                gameState = 'playing'; totalZombiesInWave = selectedZombiesCount;
                resizeCanvas();
                restartGame();
            }, 1500);
        }
    }

    function exitGame() {
        if (confirm("Вы хотите выйти из игры?")) {
            window.close();
            mainMenuScreen.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%;'>Игра закрыта</h1>";
        }
    }

    function goToMenu() {
        isPaused = false;
        pauseScreen.style.display = 'none';
        gameOverScreen.style.display = 'none'; victoryScreen.style.display = 'none';
        mainMenuScreen.style.display = 'flex';
        isShovelActive = false; shovelBtn.classList.remove('active');
        gameState = 'menu'; initGrid(); zombies = []; peas = []; naturalSuns = []; explosions = [];
        updateZombieCounterUI();
    }

    function handleGameCanvasClick(clientX, clientY) {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        const clickX = clientX - rect.left;
        const clickY = clientY - rect.top;

        for (let i = naturalSuns.length - 1; i >= 0; i--) {
            if (naturalSuns[i].checkClick(clickX, clickY)) {
                sun += 25; naturalSuns.splice(i, 1); updateCardsUI();
                return;
            }
        }

        if (isShovelActive) {
            const c = Math.floor(clickX / cellWidth);
            const r = Math.floor(clickY / cellHeight);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                if (grid[r][c] !== null) {
                    grid[r][c] = null;
                }
            }
            isShovelActive = false;
            shovelBtn.classList.remove('active');
        }
    }

    canvas.addEventListener('click', (e) => handleGameCanvasClick(e.clientX, e.clientY));

    function handleDragStart(type, clientX, clientY) {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        
        isShovelActive = false;
        shovelBtn.classList.remove('active');

        if (Date.now() < plantCooldownsEnd[type]) {
            return;
        }

        const prices = { peashooter: 100, sunflower: 50, wallnut: 50, cherrybomb: 125, potatomine: 25 };
        if (sun < prices[type]) return;

        draggingPlantType = type;
        isDragging = true;
        
        handleDragMove(clientX, clientY);
    }

    function handleDragMove(clientX, clientY) {
        if (!isDragging || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        mousePos.x = clientX - rect.left;
        mousePos.y = clientY - rect.top;
    }

    function handleDragEnd(clientX, clientY) {
        if (!isDragging || isPaused) return;

        const rect = canvas.getBoundingClientRect();
        const dropX = clientX - rect.left;
        const dropY = clientY - rect.top;

        const c = Math.floor(dropX / cellWidth);
        const r = Math.floor(dropY / cellHeight);

        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && dropX >= 0 && dropX <= canvas.width && dropY >= 0 && dropY <= canvas.height) {
            if (grid[r][c] === null) {
                const prices = { peashooter: 100, sunflower: 50, wallnut: 50, cherrybomb: 125, potatomine: 25 };
                let cost = prices[draggingPlantType];
                
                if (sun >= cost && Date.now() >= plantCooldownsEnd[draggingPlantType]) {
                    sun -= cost;
                    grid[r][c] = new Plant(draggingPlantType, r, c);
                    plantCooldownsEnd[draggingPlantType] = Date.now() + plantCooldownsMax[draggingPlantType];
                }
            }
        }
        
        isDragging = false; 
        draggingPlantType = null; 
        updateCardsUI();
    }

    Object.keys(cardElements).forEach(type => {
        cardElements[type].addEventListener('mousedown', (e) => handleDragStart(type, e.clientX, e.clientY));
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) handleDragMove(e.clientX, e.clientY);
        else if (isShovelActive) {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
        }
    });
    window.addEventListener('mouseup', (e) => handleDragEnd(e.clientX, e.clientY));

    Object.keys(cardElements).forEach(type => {
        cardElements[type].addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleDragStart(type, touch.clientX, touch.clientY);
        }, {passive: true});
    });

    window.addEventListener('touchmove', (e) => {
        if (!isDragging && !isShovelActive) return;
        const touch = e.touches[0];
        handleDragMove(touch.clientX, touch.clientY);
    }, {passive: false});

    window.addEventListener('touchend', (e) => {
        if (isDragging) {
            const touch = e.changedTouches[0];
            handleDragEnd(touch.clientX, touch.clientY);
        } else if (isShovelActive) {
            const touch = e.changedTouches[0];
            handleGameCanvasClick(touch.clientX, touch.clientY);
        }
    });

    function drawGrid() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                ctx.fillStyle = (r + c) % 2 === 0 ? '#4caf50' : '#388e3c';
                ctx.fillRect(c * cellWidth, r * cellHeight, cellWidth, cellHeight);
                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.strokeRect(c * cellWidth, r * cellHeight, cellWidth, cellHeight);
            }
        }

        let checkX = isDragging ? mousePos.x : (isShovelActive ? mousePos.x : -1);
        let checkY = isDragging ? mousePos.y : (isShovelActive ? mousePos.y : -1);

        if (checkX >= 0 && checkY >= 0 && !isPaused) {
            const hoverC = Math.floor(checkX / cellWidth);
            const hoverR = Math.floor(checkY / cellHeight);
            if (hoverR >= 0 && hoverR < ROWS && hoverC >= 0 && hoverC < COLS) {
                ctx.save();
                ctx.strokeStyle = isShovelActive ? 'rgba(231, 76, 60, 0.8)' : 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = 4;
                ctx.strokeRect(hoverC * cellWidth + 2, hoverR * cellHeight + 2, cellWidth - 4, cellHeight - 4);
                ctx.restore();
            }
        }
    }

    function drawExplosions(now) {
        ctx.save();
        for (let i = explosions.length - 1; i >= 0; i--) {
            let exp = explosions[i];
            if (now > exp.endTime) { explosions.splice(i, 1); continue; }
            if (isBoomImgLoaded) { ctx.drawImage(imgBoom, exp.x, exp.y, exp.w, exp.h); } 
            else {
                let timeLeft = exp.endTime - now; ctx.globalAlpha = timeLeft / 500; 
                ctx.fillStyle = 'rgba(231, 76, 60, 0.7)'; ctx.fillRect(exp.x, exp.y, exp.w, exp.h);
            }
        }
        ctx.restore();
    }

    function endGame() { gameOver = true; gameOverScreen.style.display = 'flex'; }

    function restartGame() {
        initGrid(); zombies = []; peas = []; naturalSuns = []; explosions = [];
        sun = 150; zombiesSpawnedSoFar = 0; isDragging = false; draggingPlantType = null; gameOver = false;
        isShovelActive = false; shovelBtn.classList.remove('active');
        isPaused = false; pauseOffsetTotal = 0;
        pauseScreen.style.display = 'none';
        gameStartTime = Date.now(); lastZombieSpawnTime = Date.now() + START_DELAY; 
        zombieSpawnInterval = getRandomSpawnInterval(); lastSkySunSpawnTime = Date.now(); skySunSpawnInterval = getRandomSkySunInterval();
        gameOverScreen.style.display = 'none'; victoryScreen.style.display = 'none';

        const now = Date.now();
        plantCooldownsEnd.sunflower = now + 1000;
        plantCooldownsEnd.peashooter = now + 2000;
        plantCooldownsEnd.wallnut = now + 3000;
        plantCooldownsEnd.cherrybomb = now + 5000;
        plantCooldownsEnd.potatomine = now + 3000;

        updateCardsUI(); updateZombieCounterUI();
    }

    let lastTime = Date.now();

    function gameLoop() {
        const now = Date.now(); 
        let deltaTime = now - lastTime; 
        lastTime = now;

        if (isPaused) { deltaTime = 0; }

        if (gameState === 'fortune') { updateWheelPhysics(); drawWheel(); }

        if (gameState === 'playing' && !gameOver && !isPaused) {
            let actualGameTime = now - pauseOffsetTotal;
            
            if (actualGameTime - gameStartTime >= START_DELAY) {
                if ((isInfiniteMode || zombiesSpawnedSoFar < totalZombiesInWave) && (now - lastZombieSpawnTime >= zombieSpawnInterval)) {
                    let rand = Math.random();
                    let zombieType = 'normal';
                    if (rand < 0.25) { zombieType = 'bucket'; } 
                    else if (rand < 0.55) { zombieType = 'cone'; }
                    
                    zombies.push(new Zombie(Math.floor(Math.random() * ROWS), zombieType));
                    zombiesSpawnedSoFar++; 
                    lastZombieSpawnTime = now;
                    zombieSpawnInterval = getRandomSpawnInterval(); 
                    updateZombieCounterUI();
                }
            }

            if (now - lastSkySunSpawnTime >= skySunSpawnInterval) {
                naturalSuns.push(new SkySun()); lastSkySunSpawnTime = now;
                skySunSpawnInterval = getRandomSkySunInterval();
            }

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) { if (grid[r][c]) grid[r][c].update(now); }
            }
            for (let i = 0; i < zombies.length; i++) zombies[i].update(now, deltaTime);
            for (let i = peas.length - 1; i >= 0; i--) { if (peas[i].update(deltaTime)) peas.splice(i, 1); }
            for (let i = 0; i < naturalSuns.length; i++) naturalSuns[i].update(deltaTime);

            updateCardsUI();
        }

        if (gameState === 'playing' || gameState === 'victory_screen_active') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) { if (grid[r][c]) grid[r][c].draw(); }
            }
            for (let i = 0; i < peas.length; i++) peas[i].draw();
            for (let i = 0; i < zombies.length; i++) zombies[i].draw();
            for (let i = 0; i < naturalSuns.length; i++) naturalSuns[i].draw();
            
            ctx.save();
            for (let i = explosions.length - 1; i >= 0; i--) {
                let exp = explosions[i];
                if (isPaused) exp.endTime += deltaTime; 
                if (now > exp.endTime) { explosions.splice(i, 1); continue; }
                if (isBoomImgLoaded) { ctx.drawImage(imgBoom, exp.x, exp.y, exp.w, exp.h); } 
                else {
                    let timeLeft = exp.endTime - now; ctx.globalAlpha = timeLeft / 500; 
                    ctx.fillStyle = 'rgba(231, 76, 60, 0.7)'; ctx.fillRect(exp.x, exp.y, exp.w, exp.h);
                }
            }
            ctx.restore();

            if (!gameOver && gameState === 'playing') {
                let timePassed = (now - pauseOffsetTotal) - gameStartTime;
                if (timePassed < START_DELAY) {
                    let timeLeft = Math.ceil((START_DELAY - timePassed) / 1000);
                    ctx.save(); ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(10, 10, 280, 35);
                    ctx.fillStyle = '#2ecc71'; ctx.font = 'bold 16px Arial';
                    ctx.fillText(`Нападение через: ${timeLeft} сек`, 20, 32); ctx.restore();
                }
            }

            if (isDragging && mousePos.x >= 0 && mousePos.y >= 0 && !isPaused) {
                const tempPlant = new Plant(draggingPlantType, 0, 0);
                tempPlant.draw(mousePos.x, mousePos.y, 0.6);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    resizeCanvas(); initGrid(); updateCardsUI(); gameLoop();
</script>
