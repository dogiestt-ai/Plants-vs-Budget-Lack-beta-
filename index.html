<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Plants vs. Budget Lack</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a2f0a;
            font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #0a2f0a;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a472a, #0a2f1a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
            transition: opacity 0.5s ease;
            padding: 20px;
        }

        #loading-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #7fff00;
            text-shadow: 0 0 15px #7fff00;
            text-align: center;
        }

        #loading-sub {
            font-size: 16px;
            color: #aaffaa;
            margin-bottom: 30px;
            text-align: center;
        }

        .progress-container {
            width: 250px;
            height: 20px;
            background-color: #2a4a2a;
            border-radius: 20px;
            padding: 3px;
            border: 2px solid #4a8a4a;
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #7fff00, #3eff00);
            border-radius: 15px;
            transition: width 0.1s linear;
        }

        #start-action-btn {
            display: none;
            padding: 12px 35px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #ff8c00, #ff5500);
            border: 3px solid #ffaa00;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255,100,0,0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255,100,0,0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(255,100,0,0.9); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255,100,0,0.5); }
        }

        #main-menu-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('menu_image.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a4a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 15px;
            padding: 20px;
        }

        .menu-btn {
            padding: 12px 25px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: 3px solid #1e8449;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 280px;
            text-align: center;
            touch-action: manipulation;
        }
        .menu-btn:active { transform: scale(0.97); }

        .menu-btn.exit {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-color: #962d22;
        }

        #fortune-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: white;
            padding: 20px;
        }

        #wheel-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #f1c40f;
            text-align: center;
        }

        #wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 10px auto;
        }

        #wheel-pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 210;
        }

        #wheelCanvas {
            background: #2c3e50;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            width: 100% !important;
            height: 100% !important;
        }
        
        #wheel-skip-btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            background: #e67e22;
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #top-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            padding: 8px 12px;
            width: 100%;
            min-height: 44px;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            z-index: 10;
            flex-shrink: 0;
        }

        .panel-section { display: flex; align-items: center; gap: 5px; }
        #sun-icon { font-size: 18px; }
        #zombie-counter-panel { font-size: 14px; text-align: right; }

        #canvas-wrapper {
            flex: 1;
            width: 100%;
            background-color: #0a2f0a;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #2e7d32;
        }

        /* НИЖНЯЯ ПАНЕЛЬ - ВСЕ ЭЛЕМЕНТЫ В СТРОКУ */
        #bottom-container {
            background-color: #2c3e50;
            border-top: 3px solid #e67e22;
            padding: 8px;
            width: 100%;
            min-height: 90px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            overflow-x: visible;
        }

        /* КОНТЕЙНЕР С КАРТОЧКАМИ - ГОРИЗОНТАЛЬНАЯ ПРОКРУТКА */
        #cards-container { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            padding-bottom: 4px;
        }
        #cards-container::-webkit-scrollbar {
            height: 4px;
        }
        #cards-container::-webkit-scrollbar-track {
            background: #1a2a3a;
            border-radius: 2px;
        }
        #cards-container::-webkit-scrollbar-thumb {
            background: #e67e22;
            border-radius: 2px;
        }

        .card {
            position: relative;
            width: 75px;
            height: 80px;
            flex-shrink: 0;
            background: #ecf0f1;
            border: 3px solid #bdc3c7;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            text-align: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.05s;
            color: #2c3e50;
            touch-action: manipulation;
            line-height: 1.3;
        }
        @media (min-width: 600px) {
            .card { width: 85px; height: 90px; font-size: 12px; }
        }
        @media (max-width: 450px) {
            .card { width: 65px; height: 75px; font-size: 10px; }
        }
        .card:active { transform: scale(0.96); }
        
        .card-cooldown-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
        }
        
        .card.cooldown-active .card-cooldown-overlay { opacity: 1; }
        .card.disabled {
            background-color: #95a5a6 !important;
            border-color: #7f8c8d !important;
            opacity: 0.6;
        }
        .card .cost { font-size: 10px; color: #d35400; margin-top: 3px; font-weight: bold; }

        /* ЛОПАТА */
        .shovel-btn {
            width: 70px;
            height: 80px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #7f8c8d, #95a5a6);
            border: 3px solid #7f8c8d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transition: transform 0.05s;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
        }
        @media (min-width: 600px) { .shovel-btn { width: 80px; height: 90px; font-size: 16px; } }
        @media (max-width: 450px) { .shovel-btn { width: 60px; height: 75px; font-size: 12px; } }
        .shovel-btn:active { transform: scale(0.96); }
        .shovel-btn.active {
            border-color: #e74c3c;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        /* КНОПКИ СПРАВА - ВЕРТИКАЛЬНЫЙ СТОЛБИК */
        .right-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .cheat-btn, .pause-btn, .summon-gargantuar-btn, .cheat-sun-btn {
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border: 2px solid #6c3483;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            touch-action: manipulation;
        }
        @media (min-width: 600px) {
            .cheat-btn, .pause-btn, .summon-gargantuar-btn, .cheat-sun-btn { padding: 10px 14px; font-size: 13px; }
        }
        @media (max-width: 450px) {
            .cheat-btn, .pause-btn, .summon-gargantuar-btn, .cheat-sun-btn { padding: 5px 8px; font-size: 10px; }
        }
        
        .summon-gargantuar-btn { background: linear-gradient(135deg, #e67e22, #d35400); border-color: #a04000; }
        .pause-btn { background: linear-gradient(135deg, #f39c12, #d35400); border-color: #a04000; }
        .cheat-sun-btn { background: linear-gradient(135deg, #f1c40f, #e67e22); border-color: #d35400; color: #2c3e50; text-shadow: none; }

        #game-over-screen, #victory-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            z-index: 500;
            padding: 20px;
        }
        #game-over-screen { color: #e74c3c; }
        #victory-screen { color: #2ecc71; }

        #pause-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 400;
            padding: 20px;
        }

        .pause-dialog {
            background: #2c3e50;
            border: 4px solid #f1c40f;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 280px;
        }

        .pause-title { color: #fff; font-size: 26px; font-weight: bold; }
        .pause-menu-btn {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: 3px solid #1e8449;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
        }
        .pause-menu-btn.exit { background: linear-gradient(135deg, #e74c3c, #c0392b); border-color: #962d22; }
        .restart-btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 18px;
            background: #2ecc71;
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="loading-screen">
        <div id="loading-title">ЗАЩИТА САДА</div>
        <div id="loading-sub">Загрузка текстур...</div>
        <div class="progress-container">
            <div id="main-progress-bar" class="progress-bar"></div>
        </div>
        <button id="start-action-btn">НАЧАТЬ ИГРУ</button>
    </div>

    <div id="main-menu-screen">
        <button class="menu-btn" onclick="openWheelOfFortune(false)">ОБЫЧНЫЙ РЕЖИМ</button>
        <button class="menu-btn" onclick="openWheelOfFortune(true)" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
        <button class="menu-btn exit" onclick="exitGame()">ВЫХОД</button>
    </div>

    <div id="fortune-screen">
        <div id="wheel-title">ОПРЕДЕЛЕНИЕ ВОЛНЫ</div>
        <div id="wheel-container">
            <div id="wheel-pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        <button id="wheel-skip-btn" onclick="skipWheelSpin()">ПРОПУСТИТЬ</button>
    </div>

    <div id="pause-screen">
        <div class="pause-dialog">
            <div class="pause-title">ПАУЗА</div>
            <button class="pause-menu-btn" onclick="resumeGame()">ПРОДОЛЖИТЬ</button>
            <button class="pause-menu-btn exit" onclick="goToMenu()">В МЕНЮ</button>
        </div>
    </div>

    <div id="top-panel">
        <div class="panel-section">
            <span id="sun-icon">СОЛНЦЕ</span> <span id="sun-count">150</span>
        </div>
        <div class="panel-section" id="zombie-counter-panel">
            УБИТО: <span id="zombies-killed-count">0</span> / <span id="zombies-total-count">0</span>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="bottom-container">
        <div id="cards-container">
            <div class="card" id="card-peashooter">
                Горохострел
                <div class="cost">100</div>
                <div class="card-cooldown-overlay" id="cd-peashooter">0</div>
            </div>
            <div class="card" id="card-icepeashooter">
                Лед. Горох
                <div class="cost">175</div>
                <div class="card-cooldown-overlay" id="cd-icepeashooter">0</div>
            </div>
            <div class="card" id="card-sunflower">
                Подсолнух
                <div class="cost">50</div>
                <div class="card-cooldown-overlay" id="cd-sunflower">0</div>
            </div>
            <div class="card" id="card-wallnut">
                Грец. Орех
                <div class="cost">50</div>
                <div class="card-cooldown-overlay" id="cd-wallnut">0</div>
            </div>
            <div class="card" id="card-chomper">
                Чомпер
                <div class="cost">150</div>
                <div class="card-cooldown-overlay" id="cd-chomper">0</div>
            </div>
            <div class="card" id="card-cherrybomb">
                Вишн. Бомба
                <div class="cost">125</div>
                <div class="card-cooldown-overlay" id="cd-cherrybomb">0</div>
            </div>
            <div class="card" id="card-potatomine">
                Карт. Мина
                <div class="cost">25</div>
                <div class="card-cooldown-overlay" id="cd-potatomine">0</div>
            </div>
            <div class="card" id="card-admin">
                АДМИН
                <div class="cost">2000</div>
                <div class="card-cooldown-overlay" id="cd-admin">0</div>
            </div>
            <div class="shovel-btn" id="shovel-btn" onclick="toggleShovel()">ЛОПАТА</div>
        </div>
        <div class="right-buttons">
            <button class="cheat-sun-btn" id="cheat-sun-btn" onclick="addCheatSun()">+5000</button>
            <button class="cheat-btn" id="cheat-kill-btn" onclick="triggerCheatMassKill()">УБИТЬ</button>
            <button class="summon-gargantuar-btn" id="summon-gargantuar-btn" onclick="summonGargantuar()">ГАРГАНТЮА</button>
            <button class="pause-btn" onclick="pauseGame()">МЕНЮ</button>
        </div>
    </div>

    <div id="game-over-screen">
        <div>ПОРАЖЕНИЕ!</div>
        <button class="restart-btn" onclick="goToMenu()">В МЕНЮ</button>
    </div>

    <div id="victory-screen">
        <div>ПОБЕДА!</div>
        <div id="victory-subtext" style="font-size: 18px; margin-top: 15px;">Возвращение в меню...</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const sunCountEl = document.getElementById('sun-count');
    const shovelBtn = document.getElementById('shovel-btn');
    const canvasWrapper = document.getElementById('canvas-wrapper');
    
    const loadingScreen = document.getElementById('loading-screen');
    const startActionBtn = document.getElementById('start-action-btn');
    
    const cardElements = {
        peashooter: document.getElementById('card-peashooter'),
        icepeashooter: document.getElementById('card-icepeashooter'),
        sunflower: document.getElementById('card-sunflower'),
        wallnut: document.getElementById('card-wallnut'),
        chomper: document.getElementById('card-chomper'),
        cherrybomb: document.getElementById('card-cherrybomb'),
        potatomine: document.getElementById('card-potatomine'),
        admin: document.getElementById('card-admin')
    };

    const cdElements = {
        peashooter: document.getElementById('cd-peashooter'),
        icepeashooter: document.getElementById('cd-icepeashooter'),
        sunflower: document.getElementById('cd-sunflower'),
        wallnut: document.getElementById('cd-wallnut'),
        chomper: document.getElementById('cd-chomper'),
        cherrybomb: document.getElementById('cd-cherrybomb'),
        potatomine: document.getElementById('cd-potatomine'),
        admin: document.getElementById('cd-admin')
    };

    const plantCooldownsMax = {
        peashooter: 7000,
        icepeashooter: 7000,
        sunflower: 7000,
        wallnut: 25000,
        chomper: 42000,
        cherrybomb: 35000,
        potatomine: 30000,
        admin: 50000
    };

    let plantCooldownsEnd = { peashooter: 0, icepeashooter: 0, sunflower: 0, wallnut: 0, chomper: 0, cherrybomb: 0, potatomine: 0, admin: 0 };

    const gameOverScreen = document.getElementById('game-over-screen');
    const victoryScreen = document.getElementById('victory-screen');
    const mainMenuScreen = document.getElementById('main-menu-screen');
    const fortuneScreen = document.getElementById('fortune-screen');
    const wheelCanvas = document.getElementById('wheelCanvas');
    const wheelCtx = wheelCanvas.getContext('2d');
    const pauseScreen = document.getElementById('pause-screen');
    const cheatKillBtn = document.getElementById('cheat-kill-btn');

    const wheelNumbers = [];
    for(let i = 20; i <= 50; i++) wheelNumbers.push(i);
    
    let wheelAngle = 0;
    let wheelSpeed = 0;
    let isWheelSpinning = false;
    let selectedZombiesCount = 30;
    let wheelSpinTimeout = null;
    let isForceStopping = false;

    let isInfiniteMode = false;
    let isPaused = false;
    let savedPauseTime = 0; 
    let pauseOffsetTotal = 0; 
    
    let poisonedCells = [];
    let isSummoningInProgress = false;
    let zombiesKilledTotal = 0;
    
    let isAttackStarted = false;
    let attackStartTimer = null;
    let gargantuarSpawned = false;

    const audioMenu = new Audio('Menu_Sound.mp3'); audioMenu.loop = true;
    const audioPlay = new Audio('Play_Sound.mp3'); audioPlay.loop = true;
    const audioPosadka = new Audio('posadka.mp3');
    const audioCooldownNotReady = new Audio('cooldown.mp3');
    const audioLopata = new Audio('lopata.mp3');

    function playMenuMusic() {
        try { audioPlay.pause(); audioPlay.currentTime = 0; audioMenu.play(); } catch(e) {}
    }
    function playPlayMusic() {
        try { audioMenu.pause(); audioMenu.currentTime = 0; audioPlay.play(); } catch(e) {}
    }

    // Images
    const imgPeashooter = new Image(); imgPeashooter.src = 'goroxostrel.png';
    const imgIcePeashooter = new Image(); imgIcePeashooter.src = 'ice_gorosheck.png';
    const imgSunflower = new Image(); imgSunflower.src = 'podsolnyx.png';
    const imgZombie = new Image(); imgZombie.src = 'zombi-one-part.png';
    const imgZombieBucket = new Image(); imgZombieBucket.src = 'zombi_backet.png';
    const imgZombieCone = new Image(); imgZombieCone.src = 'zombi_konys.png';
    const imgWallnut = new Image(); imgWallnut.src = 'orex.png';
    const imgSunFile = new Image(); imgSunFile.src = 'solnishko.png';
    const imgCherry = new Image(); imgCherry.src = 'vishna.png';
    const imgBoom = new Image(); imgBoom.src = 'BOOM.png';
    const imgMineUnder = new Image(); imgMineUnder.src = 'kartoshka_zemla.png';
    const imgMineReady = new Image(); imgMineReady.src = 'kartoshka.png';
    const imgChomperIdle = new Image(); imgChomperIdle.src = 'chomper_sdyn.png';
    const imgChomperEat = new Image(); imgChomperEat.src = 'chomper_eat.png';
    const imgGargantuar = new Image(); imgGargantuar.src = 'gargantuar.png';
    const imgAdmin = new Image(); imgAdmin.src = 'admin228.png';
    const imgBrokenZombie = new Image(); imgBrokenZombie.src = 'brombi.png';

    const allImages = [imgPeashooter, imgIcePeashooter, imgSunflower, imgZombie, imgZombieBucket, imgZombieCone, imgWallnut, imgSunFile, imgCherry, imgBoom, imgMineUnder, imgMineReady, imgChomperIdle, imgChomperEat, imgGargantuar, imgAdmin, imgBrokenZombie];
    
    let loadedCount = 0;

    function checkAllLoaded() {
        loadedCount++;
        let percent = (loadedCount / totalImages) * 100;
        const progressBar = document.getElementById('main-progress-bar');
        if (progressBar) progressBar.style.width = percent + "%";
        if (loadedCount >= totalImages) {

                const loadingTitle = document.getElementById('loading-title');
                const loadingSub = document.getElementById('loading-sub');
                if (loadingTitle) loadingTitle.textContent = "ГОТОВО!";
                if (loadingSub) loadingSub.textContent = "Нажмите для старта";
                if (startActionBtn) startActionBtn.style.display = "block";
            }, 500);
        }
    }
    
    for (let img of allImages) {
        img.onload = checkAllLoaded;
        img.onerror = () => { checkAllLoaded(); };

    }

    startActionBtn.addEventListener('click', () => {
        loadingScreen.style.opacity = '0';
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
        gameState = 'menu';
        playMenuMusic();
    });

    let cellWidth = 80, cellHeight = 80, spriteSize = 80; 
    const COLS = 10, ROWS = 5;

    let gameState = 'loading'; 
    let sun = 150;
    let grid = [], zombies = [], peas = [], naturalSuns = [], explosions = [], adminViruses = []; 
    let gameOver = false;

    let totalZombiesInWave = 0, zombiesSpawnedSoFar = 0;
    const START_DELAY = 60000; 
    let gameStartTime = 0, lastZombieSpawnTime = 0;
    let zombieSpawnInterval = getRandomSpawnInterval();
    let lastSkySunSpawnTime = 0, skySunSpawnInterval = getRandomSkySunInterval();

    let draggingPlantType = null;
    let mousePos = { x: -1, y: -1 };
    let isDragging = false;
    let isShovelActive = false;

    function addCheatSun() {
        if (gameState !== 'playing' || gameOver) return;
        sun += 5000;
        updateCardsUI();
        const sunEl = document.getElementById('sun-count');
        if (sunEl) {
            sunEl.style.transform = 'scale(1.2)';
            setTimeout(() => { if(sunEl) sunEl.style.transform = 'scale(1)'; }, 200);
        }
    }

    function resizeCanvas() {
        const wrapper = canvasWrapper;
        if (!wrapper) return;
        const w = wrapper.clientWidth;
        const h = wrapper.clientHeight;
        if (w > 0 && h > 0) {
            canvas.width = w;
            canvas.height = h;
            cellWidth = w / COLS;
            cellHeight = h / ROWS;
            spriteSize = Math.min(cellWidth, cellHeight) * 0.85;
        }
    }
    
    setTimeout(resizeCanvas, 100);
    window.addEventListener('resize', () => setTimeout(resizeCanvas, 100));
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

    function initGrid() {
        grid = [];
        for (let r = 0; r < ROWS; r++) {
            grid[r] = [];
            for (let c = 0; c < COLS; c++) grid[r][c] = null;
        }
    }

    function getRandomSpawnInterval() { return Math.random() * (6000 - 4000) + 4000; }
    function getRandomSkySunInterval() { return Math.random() * (20000 - 10000) + 10000; }

    function triggerCheatMassKill() {
        if (gameState !== 'playing' || gameOver || isPaused || zombies.length === 0) return;
        if (!isAttackStarted) return;
        
        const killedCount = zombies.length - 1;
        zombies = [zombies[0]];
        zombiesKilledTotal += killedCount;
        if (!isInfiniteMode) zombiesSpawnedSoFar = totalZombiesInWave;
        updateZombieCounterUI();
        checkVictoryCondition();
    }
    
    function summonGargantuar() {
        if (gameState !== 'playing' || gameOver || isPaused || isSummoningInProgress) return;
        if (!isAttackStarted) return;
        
        isSummoningInProgress = true;
        const row = Math.floor(Math.random() * ROWS);
        zombies.push(new Zombie(row, 'gargantuar'));
        updateZombieCounterUI();
        setTimeout(() => { isSummoningInProgress = false; }, 200);
    }

    function toggleShovel() {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        isShovelActive = !isShovelActive;
        if (isShovelActive) {
            isDragging = false;
            draggingPlantType = null;
            shovelBtn.classList.add('active');
        } else {
            shovelBtn.classList.remove('active');
        }
    }

    function pauseGame() {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        isPaused = true;
        savedPauseTime = Date.now();
        pauseScreen.style.display = 'flex';
        try { audioPlay.pause(); } catch(e) {}
    }

    function resumeGame() {
        if (!isPaused) return;
        isPaused = false;
        let pausedDuration = Date.now() - savedPauseTime;
        pauseOffsetTotal += pausedDuration;
        for (let type in plantCooldownsEnd) {
            if (plantCooldownsEnd[type] > savedPauseTime) plantCooldownsEnd[type] += pausedDuration;
        }
        pauseScreen.style.display = 'none';
        try { audioPlay.play(); } catch(e) {}
    }

    // ============== КЛАССЫ ==============
    
    class AdminVirus {
        constructor(x, y, r) {
            this.x = x; this.y = y; this.r = r;
            this.speed = cellWidth * 0.0035;
            this.radius = Math.min(cellWidth, cellHeight) * 0.1;
        }
        update(deltaTime) {
            if (isPaused) return false;
            this.x += this.speed * deltaTime;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                let zLeft = z.x;
                let zRight = z.x + z.hitboxWidth;
                let virusLeft = this.x - this.radius;
                if (z.occupyRows.includes(this.r) && virusLeft <= zRight && this.x + this.radius >= zLeft) {
                    if (z.type === 'gargantuar') {
                        for (let hit = 0; hit < 2; hit++) z.takeDamage('admin');
                    } else {
                        z.hp -= 2;
                        if (z.hp <= 0) {
                            zombies.splice(i, 1);
                            zombiesKilledTotal++;
                            updateZombieCounterUI();
                            checkVictoryCondition();
                        }
                    }
                    return true;
                }
            }
            return this.x > canvas.width;
        }
        draw() {
            ctx.save();
            ctx.fillStyle = '#ff00ff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff00ff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px Arial';
            ctx.fillText('V', this.x - 4, this.y + 5);
            ctx.restore();
        }
    }

    class BrokenZombie {
        constructor(r, x) {
            this.r = r; this.x = x;
            this.type = 'broken';
            this.hitboxWidth = cellWidth * 0.7;
            this.drawWidth = cellWidth * 0.9;
            this.drawHeight = cellHeight * 0.9;
            this.speed = cellWidth / 8000;
            this.hp = 1;
            this.occupyRows = [r];
        }
        update(now, deltaTime) {
            if (isPaused) return false;
            this.x -= this.speed * deltaTime;
            for (let i = 0; i < zombies.length; i++) {
                let other = zombies[i];
                if (other === this) continue;
                if (other.occupyRows && other.occupyRows.includes(this.r)) {
                    let otherLeft = other.x;
                    let otherRight = other.x + (other.hitboxWidth || cellWidth * 0.7);
                    let thisLeft = this.x;
                    let thisRight = this.x + this.hitboxWidth;
                    if (thisRight >= otherLeft && thisLeft <= otherRight) {
                        zombies.splice(i, 1);
                        return true;
                    }
                }
            }
            return false;
        }
        draw() {
            ctx.save();
            let drawX = this.x;
            let drawY = (this.r * cellHeight) + (cellHeight / 2) - this.drawHeight / 2;
            if (imgBrokenZombie.complete && imgBrokenZombie.naturalWidth > 0) {
                ctx.drawImage(imgBrokenZombie, drawX, drawY, this.drawWidth, this.drawHeight);
            } else {
                ctx.fillStyle = '#888888';
                ctx.fillRect(drawX, drawY, this.drawWidth, this.drawHeight);
            }
            ctx.restore();
        }
    }

    class Plant {
        constructor(type, r, c) {
            this.type = type; this.r = r; this.c = c;
            this.lastActionTime = Date.now();
            this.birthTime = Date.now(); 
            this.isChewing = false;
            this.chewingEndTime = 0;
            this.lastUltTime = Date.now();
            
            if (type === 'peashooter') { this.actionInterval = 4000; this.hp = 10000; }
            else if (type === 'icepeashooter') { this.actionInterval = 4000; this.hp = 10000; }
            else if (type === 'sunflower') { this.actionInterval = 10000; this.hp = 10000; }
            else if (type === 'wallnut') { this.actionInterval = 0; this.hp = 50000; }
            else if (type === 'chomper') { this.actionInterval = 0; this.hp = 10000; }
            else if (type === 'cherrybomb') { this.actionInterval = 3000; this.hp = 999999; }
            else if (type === 'potatomine') { this.actionInterval = 15000; this.hp = 500; this.isReady = false; }
            else if (type === 'admin') { this.actionInterval = 3000; this.hp = 30; this.ultCooldown = 50000; }
        }

        update(now) {
            if (isPaused) return;
            if (this.type === 'chomper' && this.isChewing && now >= this.chewingEndTime) this.isChewing = false;
            let currentX = this.c * cellWidth;
            
            if (this.type === 'admin' && now - this.lastActionTime >= this.actionInterval) {
                const hasZombieInRow = zombies.some(z => z.occupyRows && z.occupyRows.includes(this.r));
                if (hasZombieInRow) {
                    adminViruses.push(new AdminVirus(currentX + cellWidth/2, this.r * cellHeight + cellHeight / 2, this.r));
                    this.lastActionTime = now;
                }
            }
            else if (this.type === 'admin' && now - this.lastUltTime >= this.ultCooldown) {
                this.lastUltTime = now;
                let centerX = this.c * cellWidth + cellWidth/2;
                let zombieX = centerX - cellWidth/2;
                zombies.push(new BrokenZombie(this.r, zombieX));
                let leftRow = Math.max(0, this.r - 1);
                zombies.push(new BrokenZombie(leftRow, zombieX));
                let rightRow = Math.min(ROWS - 1, this.r + 1);
                zombies.push(new BrokenZombie(rightRow, zombieX));
            }
            
            if ((this.type === 'peashooter' || this.type === 'icepeashooter') && now - this.lastActionTime >= this.actionInterval) {
                const hasZombieInRow = zombies.some(z => z.occupyRows && z.occupyRows.includes(this.r));
                if (hasZombieInRow) {
                    let peaType = this.type === 'icepeashooter' ? 'ice' : 'normal';
                    peas.push(new Pea(currentX + cellWidth/2, this.r * cellHeight + cellHeight / 2, this.r, peaType));
                    this.lastActionTime = now;
                }
            } else if (this.type === 'sunflower' && now - this.lastActionTime >= this.actionInterval) {
                sun += 25;
                updateCardsUI();
                this.lastActionTime = now;
            } else if (this.type === 'chomper' && !this.isChewing) {
                const zombieInFront = zombies.find(z => {
                    const zRightEdge = z.x + z.hitboxWidth;
                    const plantLeftEdge = this.c * cellWidth;
                    return z.occupyRows && z.occupyRows.includes(this.r) && zRightEdge >= plantLeftEdge - 5 && z.x <= plantLeftEdge + cellWidth && z.type !== 'gargantuar';
                });
                if (zombieInFront) {
                    const index = zombies.indexOf(zombieInFront);
                    if (index !== -1) {
                        zombies.splice(index, 1);
                        zombiesKilledTotal++;
                    }
                    this.isChewing = true;
                    this.chewingEndTime = now + 42000;
                    updateZombieCounterUI();
                    checkVictoryCondition();
                }
            } else if (this.type === 'cherrybomb' && now - this.birthTime >= this.actionInterval) {
                this.explodeCherry();
            } else if (this.type === 'potatomine' && !this.isReady && now - this.birthTime >= this.actionInterval) {
                this.isReady = true;
            }
        }

        explodeCherry() {
            const minR = Math.max(0, this.r - 2); const maxR = Math.min(ROWS - 1, this.r + 2);
            const minC = Math.max(0, this.c - 2); const maxC = Math.min(COLS - 1, this.c + 2);
            const minX = minC * cellWidth; const maxX = (maxC + 1) * cellWidth;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                if (z.type !== 'gargantuar' && z.type !== 'broken') {
                    for (let row of z.occupyRows) {
                        if (row >= minR && row <= maxR) {
                            let zCenterX = z.x + z.hitboxWidth / 2;
                            if (zCenterX >= minX && zCenterX <= maxX) {
                                zombies.splice(i, 1);
                                zombiesKilledTotal++;
                                break;
                            }
                        }
                    }
                }
            }
            explosions.push({ x: minX, y: minR * cellHeight, w: maxX - minX, h: (maxR - minR + 1) * cellHeight, endTime: Date.now() + 500 });
            grid[this.r][this.c] = null;
            updateZombieCounterUI();
            checkVictoryCondition();
        }

        explodeMine() {
            const minR = Math.max(0, this.r - 1); const maxR = Math.min(ROWS - 1, this.r + 1);
            const minC = Math.max(0, this.c - 1); const maxC = Math.min(COLS - 1, this.c + 1);
            const minX = minC * cellWidth; const maxX = (maxC + 1) * cellWidth;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                if (z.type !== 'broken') {
                    for (let row of z.occupyRows) {
                        if (row >= minR && row <= maxR) {
                            let zCenterX = z.x + z.hitboxWidth / 2;
                            if (zCenterX >= minX && zCenterX <= maxX) {
                                zombies.splice(i, 1);
                                zombiesKilledTotal++;
                                break;
                            }
                        }
                    }
                }
            }
            explosions.push({ x: minX, y: minR * cellHeight, w: maxX - minX, h: (maxR - minR + 1) * cellHeight, endTime: Date.now() + 500 });
            grid[this.r][this.c] = null;
            updateZombieCounterUI();
            checkVictoryCondition();
        }
        
        adminExplode() {
            const allZombies = zombies.length;
            zombies = [];
            zombiesKilledTotal += allZombies;
            explosions.push({ x: 0, y: 0, w: canvas.width, h: canvas.height, endTime: Date.now() + 500 });
            grid[this.r][this.c] = null;
            updateZombieCounterUI();
            checkVictoryCondition();
        }

        draw(customX = null, customY = null, alpha = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            let cellCenterX = (this.c * cellWidth) + (cellWidth / 2);
            let cellCenterY = (this.r * cellHeight) + (cellHeight / 2);
            let drawX = customX !== null ? customX - spriteSize/2 : cellCenterX - spriteSize/2;
            let drawY = customY !== null ? customY - spriteSize/2 : cellCenterY - spriteSize/2;
            let img = null; let fallbackColor = '#fff';
            if (this.type === 'peashooter') { img = imgPeashooter; fallbackColor = '#2ecc71'; }
            else if (this.type === 'icepeashooter') { img = imgIcePeashooter; fallbackColor = '#3498db'; }
            else if (this.type === 'sunflower') { img = imgSunflower; fallbackColor = '#f1c40f'; }
            else if (this.type === 'wallnut') { img = imgWallnut; fallbackColor = '#d35400'; }
            else if (this.type === 'chomper') { img = this.isChewing ? imgChomperEat : imgChomperIdle; fallbackColor = this.isChewing ? '#e67e22' : '#d35400'; }
            else if (this.type === 'cherrybomb') { img = imgCherry; fallbackColor = '#e74c3c'; }
            else if (this.type === 'potatomine') { img = this.isReady ? imgMineReady : imgMineUnder; fallbackColor = this.isReady ? '#e67e22' : '#795548'; }
            else if (this.type === 'admin') { img = imgAdmin; fallbackColor = '#ff0000'; }
            if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, drawX, drawY, spriteSize, spriteSize);
            else ctx.fillStyle = fallbackColor, ctx.fillRect(drawX, drawY, spriteSize, spriteSize);
            
            if (this.type === 'admin' && customX === null) {
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 10px Arial';
                ctx.fillText(`${Math.ceil(this.hp)}`, drawX + 5, drawY - 3);
                let ultRemaining = Math.max(0, this.ultCooldown - (Date.now() - this.lastUltTime)) / 1000;
                if (ultRemaining > 0) {
                    ctx.fillStyle = '#ffff00';
                    ctx.font = 'bold 8px Arial';
                    ctx.fillText(`U:${Math.ceil(ultRemaining)}s`, drawX + 5, drawY + spriteSize + 8);
                } else {
                    ctx.fillStyle = '#00ff00';
                    ctx.font = 'bold 8px Arial';
                    ctx.fillText(`ULT`, drawX + spriteSize/2 - 10, drawY + spriteSize + 5);
                }
            }
            ctx.restore();
        }
    }

    class Zombie {
        constructor(r, type = 'normal') {
            this.r = r; this.x = canvas.width; 
            this.type = type;
            this.slowedUntil = 0;
            this.hasSpawnedMinions = false;
            this.occupyRows = type === 'gargantuar' ? [r, Math.max(0, r-1)] : [r];
            this.isAttacking = false;
            this.hitCounter = 0;

            if (this.type === 'gargantuar') {
                this.hitboxWidth = cellWidth * 0.9;
                this.drawWidth = cellWidth * 1.3;
                this.drawHeight = cellHeight * 1.3;
                this.speed = cellWidth / 12000;
                this.maxHits = 20;
                this.hp = 20;
            } else if (this.type === 'broken') {
                this.hitboxWidth = cellWidth * 0.7;
                this.drawWidth = cellWidth * 0.9;
                this.drawHeight = cellHeight * 0.9;
                this.speed = cellWidth / 8000;
                this.hp = 1;
            } else {
                this.hitboxWidth = cellWidth * 0.6;
                this.drawWidth = cellWidth * 0.85;
                this.drawHeight = cellHeight * 0.85;
                this.speed = cellWidth / 6000;
                if (this.type === 'bucket') this.hp = 15;
                else if (this.type === 'cone') this.hp = 10;
                else this.hp = 5;
            }
            this.originalSpeed = this.speed;
        }
        
        applySlow(now) {
            if (this.type === 'gargantuar') return;
            this.slowedUntil = now + 5000;
            this.speed = this.originalSpeed * 0.3;
        }
        
        takeDamage(damageType) {
            if (this.type === 'gargantuar') {
                if (damageType === 'ice') this.hitCounter += 1.333;
                else this.hitCounter++;
                if (damageType === 'admin') this.hitCounter += 2;
                if (this.hitCounter >= this.maxHits) this.hp = 0;
                return;
            }
            this.hp--;
        }
        
        spawnMinionsOnDeath() {
            if (this.type === 'gargantuar' && this.hp <= 0 && !this.hasSpawnedMinions) {
                this.hasSpawnedMinions = true;
                let frontRow = this.r;
                let leftRow = Math.max(0, this.r - 1);
                let rightRow = Math.min(ROWS - 1, this.r + 1);
                zombies.push(new Zombie(frontRow, 'cone'));
                zombies.push(new Zombie(leftRow, 'cone'));
                zombies.push(new Zombie(rightRow, 'cone'));
            }
        }
        
        poisonCell() {
            if (this.type === 'gargantuar' && this.hp <= 0) {
                const cellC = Math.floor((this.x + this.hitboxWidth/2) / cellWidth);
                if (cellC >= 0 && cellC < COLS) {
                    if (!poisonedCells.some(p => p.r === this.r && p.c === cellC)) {
                        poisonedCells.push({ r: this.r, c: cellC });
                    }
                    if (grid[this.r] && grid[this.r][cellC] !== null) grid[this.r][cellC] = null;
                }
            }
        }
        
        update(now, deltaTime) {
            if (isPaused) return false;
            if (this.slowedUntil > 0 && now > this.slowedUntil) {
                this.slowedUntil = 0;
                this.speed = this.originalSpeed;
            }
            
            if (this.hp <= 0) {
                this.spawnMinionsOnDeath();
                this.poisonCell();
                return true;
            }
            
            if (this.x <= 0) { endGame(); return false; }
            
            let currentCellC = Math.floor((this.x + this.hitboxWidth/2) / cellWidth);
            let plantToAttack = null;
            for (let row of this.occupyRows) {
                if (grid[row] && grid[row][currentCellC]) {
                    plantToAttack = grid[row][currentCellC];
                    break;
                }
            }
            
            if (plantToAttack) {
                let plantLeftEdge = currentCellC * cellWidth;
                let plantRightEdge = (currentCellC + 1) * cellWidth;
                let zombieRightEdge = this.x + this.hitboxWidth;
                
                if (zombieRightEdge >= plantLeftEdge + 5 && this.x <= plantRightEdge - 5) {
                    this.isAttacking = true;
                    plantToAttack.hp -= deltaTime;
                    
                    if (plantToAttack.type === 'admin' && plantToAttack.hp <= 0) {
                        plantToAttack.adminExplode();
                    }
                    
                    if (plantToAttack.hp <= 0) {
                        for (let row of this.occupyRows) {
                            if (grid[row] && grid[row][currentCellC] === plantToAttack) {
                                grid[row][currentCellC] = null;
                                break;
                            }
                        }
                        this.isAttacking = false;
                    }
                    return false;
                }
            }
            
            this.isAttacking = false;
            this.x -= this.speed * deltaTime;
            return false;
        }
        
        draw() {
            ctx.save();
            let drawX = this.x;
            let drawY = (this.r * cellHeight) + (cellHeight / 2) - this.drawHeight / 2;
            let img = null; let fallbackColor = '#7f8c8d';
            
            if (this.type === 'gargantuar') { img = imgGargantuar; fallbackColor = '#8B4513'; }
            else if (this.type === 'broken') { img = imgBrokenZombie; fallbackColor = '#888888'; }
            else if (this.type === 'bucket') { img = imgZombieBucket; fallbackColor = '#34495e'; }
            else if (this.type === 'cone') { img = imgZombieCone; fallbackColor = '#e67e22'; }
            else { img = imgZombie; fallbackColor = '#7f8c8d'; }
            
            if (this.slowedUntil > 0 && this.type !== 'gargantuar') {
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = 'rgba(52, 152, 219, 0.4)';
                ctx.fillRect(drawX, drawY, this.drawWidth, this.drawHeight);
                ctx.globalAlpha = 1;
            }
            
            if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, drawX, drawY, this.drawWidth, this.drawHeight);
            else ctx.fillStyle = fallbackColor, ctx.fillRect(drawX, drawY, this.drawWidth, this.drawHeight);
            
            ctx.restore();
        }
    }

    class Pea {
        constructor(x, y, r, type = 'normal') { 
            this.x = x; this.y = y; this.r = r; this.type = type; 
            this.speed = cellWidth * 0.0035; 
            this.radius = Math.min(cellWidth, cellHeight) * 0.08;
        }
        update(deltaTime) {
            if (isPaused) return false;
            this.x += this.speed * deltaTime;
            for (let i = zombies.length - 1; i >= 0; i--) {
                let z = zombies[i];
                if (z.type === 'broken') continue;
                let zLeft = z.x;
                let zRight = z.x + z.hitboxWidth;
                let peaLeft = this.x - this.radius;
                
                if (z.occupyRows.includes(this.r) && peaLeft <= zRight && this.x + this.radius >= zLeft) {
                    z.takeDamage(this.type);
                    if (this.type === 'ice') z.applySlow(Date.now());
                    if (z.hp <= 0) {
                        let shouldDie = z.update(Date.now(), 0);
                        if (shouldDie || z.hp <= 0) {
                            zombies.splice(i, 1);
                            zombiesKilledTotal++;
                            updateZombieCounterUI();
                            checkVictoryCondition();
                        }
                    }
                    return true; 
                }
            }
            return this.x > canvas.width;
        }
        draw() {
            ctx.save(); 
            ctx.fillStyle = this.type === 'ice' ? '#3498db' : '#2ecc71';
            if (this.type === 'ice') ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); 
            ctx.fill();
            ctx.restore();
        }
    }

    class SkySun {
        constructor() {
            this.radius = Math.min(cellWidth, cellHeight) * 0.2;
            this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
            this.y = -this.radius;
            const targetRow = Math.floor(Math.random() * ROWS);
            this.targetY = targetRow * cellHeight + cellHeight / 2;
            this.speed = 0.08; 
        }
        update(deltaTime) {
            if (isPaused) return;
            if (this.y < this.targetY) { this.y += this.speed * deltaTime; if (this.y > this.targetY) this.y = this.targetY; }
        }
        draw() {
            ctx.save();
            if (imgSunFile.complete && imgSunFile.naturalWidth > 0) ctx.drawImage(imgSunFile, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
            else { ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); }
            ctx.restore();
        }
        checkClick(mx, my) { return Math.hypot(mx - this.x, my - this.y) <= this.radius; }
    }

    // ============== ОСТАЛЬНЫЕ ФУНКЦИИ ==============
    
    let lastUiUpdateTime = 0;
    function updateCardsUI() {
        const now = Date.now();
        if (now - lastUiUpdateTime < 100 && gameState === 'playing') return; 
        lastUiUpdateTime = now;
        sunCountEl.textContent = Math.floor(sun);
        const prices = { peashooter: 100, icepeashooter: 175, sunflower: 50, wallnut: 50, chomper: 150, cherrybomb: 125, potatomine: 25, admin: 2000 };
        for (let type in cardElements) {
            let card = cardElements[type];
            let cdOverlay = cdElements[type];
            let isNoSun = sun < prices[type];
            if (now < plantCooldownsEnd[type]) {
                let timeLeft = Math.ceil((plantCooldownsEnd[type] - now) / 1000);
                if (card) card.classList.add('cooldown-active', 'disabled');
                if (cdOverlay) cdOverlay.textContent = timeLeft;
            } else {
                if (card) card.classList.remove('cooldown-active');
                if (card) card.classList.toggle('disabled', isNoSun);
                if (cdOverlay) cdOverlay.textContent = "";
            }
        }
    }

    function updateZombieCounterUI() {
        const zombiesKilledEl = document.getElementById('zombies-killed-count');
        const zombiesTotalEl = document.getElementById('zombies-total-count');
        
        if (isInfiniteMode) {
            if (zombiesKilledEl) zombiesKilledEl.textContent = zombiesKilledTotal;
            if (zombiesTotalEl) zombiesTotalEl.textContent = '∞';
        } else {
            let remaining = totalZombiesInWave - zombiesSpawnedSoFar + zombies.length;
            let killed = totalZombiesInWave - remaining;
            if (zombiesKilledEl) zombiesKilledEl.textContent = killed;
            if (zombiesTotalEl) zombiesTotalEl.textContent = totalZombiesInWave;
        }
    }

    function checkVictoryCondition() {
        if (isInfiniteMode) return; 
        if (zombiesSpawnedSoFar >= totalZombiesInWave && zombies.length === 0 && !gameOver) {
            gameState = 'victory_screen_active'; 
            victoryScreen.style.display = 'flex';
            setTimeout(() => { goToMenu(); }, 2500);
        }
    }

    function skipWheelSpin() {
        if (!isWheelSpinning) return;
        isForceStopping = true;
        wheelSpeed = 0;
        isWheelSpinning = false;
        const numSlices = wheelNumbers.length;
        const sliceAngle = (Math.PI * 2) / numSlices;
        let normalizedAngle = (Math.PI * 1.5 - wheelAngle) % (Math.PI * 2);
        if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
        const selectedIndex = Math.floor(normalizedAngle / sliceAngle) % numSlices;
        selectedZombiesCount = wheelNumbers[selectedIndex];
        setTimeout(() => {
            fortuneScreen.style.display = 'none';
            gameState = 'playing';
            totalZombiesInWave = selectedZombiesCount;
            zombiesKilledTotal = 0;
            resizeCanvas();
            restartGame();
        }, 300);
        if (wheelSpinTimeout) clearTimeout(wheelSpinTimeout);
    }

    function openWheelOfFortune(infinite) {
        isInfiniteMode = infinite;
        mainMenuScreen.style.display = 'none';
        if (infinite) {
            gameState = 'playing';
            zombiesKilledTotal = 0;
            resizeCanvas();
            restartGame();
            playPlayMusic();
        } else {
            fortuneScreen.style.display = 'flex';
            gameState = 'fortune';
            wheelAngle = Math.random() * Math.PI * 2;
            wheelSpeed = 0.28;
            isWheelSpinning = true;
            isForceStopping = false;
            playPlayMusic();
            if (wheelSpinTimeout) clearTimeout(wheelSpinTimeout);
            wheelSpinTimeout = setTimeout(() => {
                if (isWheelSpinning && !isForceStopping) {
                    wheelSpeed = 0;
                    isWheelSpinning = false;
                    const numSlices = wheelNumbers.length;
                    const sliceAngle = (Math.PI * 2) / numSlices;
                    let normalizedAngle = (Math.PI * 1.5 - wheelAngle) % (Math.PI * 2);
                    if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
                    const selectedIndex = Math.floor(normalizedAngle / sliceAngle) % numSlices;
                    selectedZombiesCount = wheelNumbers[selectedIndex];
                    setTimeout(() => {
                        fortuneScreen.style.display = 'none';
                        gameState = 'playing';
                        totalZombiesInWave = selectedZombiesCount;
                        zombiesKilledTotal = 0;
                        resizeCanvas();
                        restartGame();
                    }, 500);
                }
                wheelSpinTimeout = null;
            }, 3500);
        }
    }

    function drawWheel() {
        if (!wheelCtx || !wheelCanvas) return;
        const numSlices = wheelNumbers.length; 
        const sliceAngle = (Math.PI * 2) / numSlices;
        const centerX = wheelCanvas.width / 2; 
        const centerY = wheelCanvas.height / 2;
        const radius = wheelCanvas.width / 2 - 15;
        wheelCtx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
        wheelCtx.save(); 
        wheelCtx.translate(centerX, centerY); 
        wheelCtx.rotate(wheelAngle);
        for (let i = 0; i < numSlices; i++) {
            wheelCtx.fillStyle = i % 2 === 0 ? '#e67e22' : '#f1c40f';
            wheelCtx.beginPath(); 
            wheelCtx.moveTo(0, 0); 
            wheelCtx.arc(0, 0, radius, i * sliceAngle, (i + 1) * sliceAngle);
            wheelCtx.closePath(); 
            wheelCtx.fill(); 
            wheelCtx.strokeStyle = '#fff'; 
            wheelCtx.lineWidth = 2;
            wheelCtx.stroke();
            wheelCtx.save();
            wheelCtx.fillStyle = '#2c3e50';
            wheelCtx.font = 'bold 16px Arial'; 
            wheelCtx.textAlign = 'center'; 
            wheelCtx.textBaseline = 'middle';
            wheelCtx.rotate(i * sliceAngle + sliceAngle / 2); 
            wheelCtx.fillText(wheelNumbers[i], radius - 25, 0);
            wheelCtx.restore();
        }
        wheelCtx.restore();
        wheelCtx.beginPath(); 
        wheelCtx.arc(centerX, centerY, 20, 0, Math.PI * 2); 
        wheelCtx.fillStyle = '#ffffff';
        wheelCtx.fill();
    }

    function updateWheelPhysics() {
        if (!isWheelSpinning) return;
        wheelAngle += wheelSpeed; 
        wheelSpeed *= 0.98; 
        if (wheelSpeed < 0.01 && wheelSpeed > 0) {
            wheelSpeed = 0;
            isWheelSpinning = false;
            const numSlices = wheelNumbers.length; 
            const sliceAngle = (Math.PI * 2) / numSlices;
            let normalizedAngle = (Math.PI * 1.5 - wheelAngle) % (Math.PI * 2);
            if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
            const selectedIndex = Math.floor(normalizedAngle / sliceAngle) % numSlices;
            selectedZombiesCount = wheelNumbers[selectedIndex];
            setTimeout(() => {
                fortuneScreen.style.display = 'none';
                gameState = 'playing'; 
                totalZombiesInWave = selectedZombiesCount;
                zombiesKilledTotal = 0;
                resizeCanvas();
                restartGame();
            }, 500);
        }
    }

    function exitGame() {
        if (confirm("Выйти из игры?")) window.close();
    }

    function goToMenu() {
        isPaused = false;
        pauseScreen.style.display = 'none';
        gameOverScreen.style.display = 'none'; 
        victoryScreen.style.display = 'none';
        mainMenuScreen.style.display = 'flex';
        isShovelActive = false; 
        if (shovelBtn) shovelBtn.classList.remove('active');
        gameState = 'menu'; 
        initGrid(); 
        zombies = []; 
        peas = []; 
        naturalSuns = []; 
        explosions = []; 
        adminViruses = [];
        poisonedCells = [];
        zombiesKilledTotal = 0;
        isAttackStarted = false;
        gargantuarSpawned = false;
        if (attackStartTimer) clearTimeout(attackStartTimer);
        updateZombieCounterUI(); 
        playMenuMusic();
    }

    function handleGameCanvasClick(clientX, clientY) {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        const clickX = clientX - rect.left;
        const clickY = clientY - rect.top;
        for (let i = naturalSuns.length - 1; i >= 0; i--) {
            if (naturalSuns[i].checkClick(clickX, clickY)) {
                sun += 25; 
                naturalSuns.splice(i, 1); 
                updateCardsUI();
                return;
            }
        }
        if (isShovelActive) {
            const c = Math.floor(clickX / cellWidth);
            const r = Math.floor(clickY / cellHeight);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r] && grid[r][c] !== null) {
                grid[r][c] = null;
                try { audioLopata.currentTime = 0; audioLopata.play(); } catch(e) {}
            }
            isShovelActive = false;
            if (shovelBtn) shovelBtn.classList.remove('active');
        }
    }

    canvas.addEventListener('click', (e) => handleGameCanvasClick(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        handleGameCanvasClick(touch.clientX, touch.clientY);
        e.preventDefault();
    });

    function handleDragStart(type, clientX, clientY) {
        if (gameState !== 'playing' || gameOver || isPaused) return;
        if (isShovelActive) {
            isShovelActive = false;
            if (shovelBtn) shovelBtn.classList.remove('active');
        }
        if (Date.now() < plantCooldownsEnd[type]) {
            try { audioCooldownNotReady.currentTime = 0; audioCooldownNotReady.play(); } catch(e) {}
            return;
        }
        const prices = { peashooter: 100, icepeashooter: 175, sunflower: 50, wallnut: 50, chomper: 150, cherrybomb: 125, potatomine: 25, admin: 2000 };
        if (sun < prices[type]) return;
        draggingPlantType = type;
        isDragging = true;
    }

    function handleDragMove(clientX, clientY) {
        if (!isDragging || isPaused) return;
        const rect = canvas.getBoundingClientRect();
        mousePos.x = clientX - rect.left;
        mousePos.y = clientY - rect.top;
    }

    function handleDragEnd(clientX, clientY) {
        if (!isDragging || isPaused) {
            isDragging = false;
            draggingPlantType = null;
            return;
        }
        const rect = canvas.getBoundingClientRect();
        const dropX = clientX - rect.left;
        const dropY = clientY - rect.top;
        const c = Math.floor(dropX / cellWidth);
        const r = Math.floor(dropY / cellHeight);
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && dropX >= 0 && dropX <= canvas.width && dropY >= 0 && dropY <= canvas.height && grid[r] && grid[r][c] === null) {
            const isPoisoned = poisonedCells.some(p => p.r === r && p.c === c);
            if (!isPoisoned) {
                const prices = { peashooter: 100, icepeashooter: 175, sunflower: 50, wallnut: 50, chomper: 150, cherrybomb: 125, potatomine: 25, admin: 2000 };
                let cost = prices[draggingPlantType];
                if (sun >= cost && Date.now() >= plantCooldownsEnd[draggingPlantType]) {
                    sun -= cost;
                    grid[r][c] = new Plant(draggingPlantType, r, c);
                    plantCooldownsEnd[draggingPlantType] = Date.now() + plantCooldownsMax[draggingPlantType];
                    try { audioPosadka.currentTime = 0; audioPosadka.play(); } catch(e) {}
                    updateCardsUI();
                }
            }
        }
        isDragging = false; 
        draggingPlantType = null; 
        updateCardsUI();
    }

    for (let type in cardElements) {
        let card = cardElements[type];
        if (card) {
            card.addEventListener('mousedown', (e) => { e.preventDefault(); handleDragStart(type, e.clientX, e.clientY); });
            card.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; handleDragStart(type, touch.clientX, touch.clientY); }, {passive: false});
        }
    }

    window.addEventListener('mousemove', (e) => { if (isDragging) handleDragMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', (e) => handleDragEnd(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => { if (isDragging) { e.preventDefault(); const touch = e.touches[0]; handleDragMove(touch.clientX, touch.clientY); } }, {passive: false});
    window.addEventListener('touchend', (e) => { if (isDragging) { const touch = e.changedTouches[0]; handleDragEnd(touch.clientX, touch.clientY); } });

    function drawGrid() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const isPoisoned = poisonedCells.some(p => p.r === r && p.c === c);
                ctx.fillStyle = isPoisoned ? '#3a5a3a' : ((r + c) % 2 === 0 ? '#4caf50' : '#388e3c');
                ctx.fillRect(c * cellWidth, r * cellHeight, cellWidth, cellHeight);
                ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                ctx.strokeRect(c * cellWidth, r * cellHeight, cellWidth, cellHeight);
            }
        }
    }

    function endGame() { gameOver = true; gameOverScreen.style.display = 'flex'; }

    function restartGame() {
        initGrid(); zombies = []; peas = []; naturalSuns = []; explosions = []; adminViruses = []; poisonedCells = [];
        sun = 150; zombiesSpawnedSoFar = 0; isDragging = false; draggingPlantType = null; gameOver = false;
        isShovelActive = false; if (shovelBtn) shovelBtn.classList.remove('active');
        isPaused = false; pauseOffsetTotal = 0;
        pauseScreen.style.display = 'none';
        isAttackStarted = false;
        gargantuarSpawned = false;
        if (attackStartTimer) clearTimeout(attackStartTimer);
        gameStartTime = Date.now(); 
        lastZombieSpawnTime = Date.now() + START_DELAY; 
        zombieSpawnInterval = getRandomSpawnInterval(); 
        lastSkySunSpawnTime = Date.now(); 
        skySunSpawnInterval = getRandomSkySunInterval();
        gameOverScreen.style.display = 'none'; 
        victoryScreen.style.display = 'none';
        if (!isInfiniteMode) zombiesKilledTotal = 0;
        const now = Date.now();
        plantCooldownsEnd = {
            sunflower: now + 2000, peashooter: now + 3000, icepeashooter: now + 3000,
            wallnut: now + 4000, chomper: now + 5000, cherrybomb: now + 6000, potatomine: now + 4000,
            admin: now + 5000
        };
        updateCardsUI(); updateZombieCounterUI();
        attackStartTimer = setTimeout(() => {
            if (gameState === 'playing' && !gameOver) isAttackStarted = true;
        }, START_DELAY);
    }

    let lastTime = Date.now();
    let infiniteGargCounter = 0;

    function gameLoop() {
        const now = Date.now(); 
        let deltaTime = Math.min(now - lastTime, 50); 
        lastTime = now;
        if (isPaused) deltaTime = 0;
        
        if (gameState === 'fortune') { 
            updateWheelPhysics(); 
            drawWheel(); 
            requestAnimationFrame(gameLoop); 
            return; 
        }
        
        if (gameState === 'playing' && !gameOver && !isPaused) {
            let actualGameTime = now - pauseOffsetTotal;
            
            if (!isInfiniteMode && isAttackStarted && !gargantuarSpawned) {
                let remainingToSpawn = totalZombiesInWave - zombiesSpawnedSoFar;
                let aliveZombies = zombies.length;
                if (remainingToSpawn === 1 && aliveZombies === 0 && !gargantuarSpawned && !isSummoningInProgress) {
                    gargantuarSpawned = true;
                    isSummoningInProgress = true;
                    const row = Math.floor(Math.random() * ROWS);
                    zombies.push(new Zombie(row, 'gargantuar'));
                    zombiesSpawnedSoFar++;
                    updateZombieCounterUI();
                    setTimeout(() => { isSummoningInProgress = false; }, 200);
                }
            }
            
            if (isAttackStarted) {
                let shouldSpawn = false;
                if (isInfiniteMode) {
                    shouldSpawn = (now - lastZombieSpawnTime >= zombieSpawnInterval);
                } else {
                    if (zombiesSpawnedSoFar < totalZombiesInWave && !gargantuarSpawned) {
                        let remainingToSpawn = totalZombiesInWave - zombiesSpawnedSoFar;
                        if (remainingToSpawn > 1) {
                            shouldSpawn = (now - lastZombieSpawnTime >= zombieSpawnInterval);
                        }
                    }
                }
                
                if (shouldSpawn && !isSummoningInProgress) {
                    let rand = Math.random();
                    let zombieType = 'normal';
                    if (rand < 0.15) zombieType = 'bucket';
                    else if (rand < 0.4) zombieType = 'cone';
                    zombies.push(new Zombie(Math.floor(Math.random() * ROWS), zombieType));
                    zombiesSpawnedSoFar++; 
                    lastZombieSpawnTime = now;
                    zombieSpawnInterval = getRandomSpawnInterval(); 
                    updateZombieCounterUI();
                }
                
                if (isInfiniteMode && isAttackStarted) {
                    if (zombiesKilledTotal > 0 && zombiesKilledTotal % 20 === 0 && !isSummoningInProgress && zombiesKilledTotal !== infiniteGargCounter) {
                        infiniteGargCounter = zombiesKilledTotal;
                        isSummoningInProgress = true;
                        zombies.push(new Zombie(Math.floor(Math.random() * ROWS), 'gargantuar'));
                        updateZombieCounterUI();
                        setTimeout(() => { isSummoningInProgress = false; }, 200);
                    }
                }
            }
            
            if (now - lastSkySunSpawnTime >= skySunSpawnInterval) {
                naturalSuns.push(new SkySun()); lastSkySunSpawnTime = now;
                skySunSpawnInterval = getRandomSkySunInterval();
            }
            for (let r = 0; r < ROWS; r++) {
                if (grid[r]) for (let c = 0; c < COLS; c++) if (grid[r][c]) grid[r][c].update(now);
            }
            for (let i = 0; i < zombies.length; i++) {
                let shouldRemove = zombies[i].update(now, deltaTime);
                if (shouldRemove) {
                    zombies.splice(i, 1);
                    zombiesKilledTotal++;
                    updateZombieCounterUI();
                    checkVictoryCondition();
                    i--;
                }
            }
            for (let i = peas.length - 1; i >= 0; i--) if (peas[i].update(deltaTime)) peas.splice(i, 1);
            for (let i = adminViruses.length - 1; i >= 0; i--) if (adminViruses[i].update(deltaTime)) adminViruses.splice(i, 1);
            for (let i = 0; i < naturalSuns.length; i++) naturalSuns[i].update(deltaTime);
            updateCardsUI();
        }
        
        if (gameState === 'playing' || gameState === 'victory_screen_active') {
            if (canvas.width === 0) resizeCanvas();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            for (let r = 0; r < ROWS; r++) if (grid[r]) for (let c = 0; c < COLS; c++) if (grid[r][c]) grid[r][c].draw();
            for (let i = 0; i < peas.length; i++) peas[i].draw();
            for (let i = 0; i < adminViruses.length; i++) adminViruses[i].draw();
            for (let i = 0; i < zombies.length; i++) zombies[i].draw();
            for (let i = 0; i < naturalSuns.length; i++) naturalSuns[i].draw();
            for (let i = explosions.length - 1; i >= 0; i--) {
                let exp = explosions[i];
                if (now > exp.endTime) { explosions.splice(i, 1); continue; }
                if (imgBoom.complete && imgBoom.naturalWidth > 0) ctx.drawImage(imgBoom, exp.x, exp.y, exp.w, exp.h);
                else { let timeLeft = exp.endTime - now; ctx.globalAlpha = timeLeft / 500; ctx.fillStyle = 'rgba(231, 76, 60, 0.7)'; ctx.fillRect(exp.x, exp.y, exp.w, exp.h); }
            }
            ctx.globalAlpha = 1;
            if (!gameOver && gameState === 'playing' && !isAttackStarted) {
                let timePassed = (now - pauseOffsetTotal) - gameStartTime;
                if (timePassed < START_DELAY) {
                    let timeLeft = Math.ceil((START_DELAY - timePassed) / 1000);
                    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(10, 10, 260, 32);
                    ctx.fillStyle = '#7fff00'; ctx.font = 'bold 14px Arial';
                    ctx.fillText(`АТАКА ЧЕРЕЗ: ${timeLeft} сек`, 20, 30);
                }
            }
            if (isDragging && mousePos.x >= 0 && mousePos.y >= 0 && !isPaused && draggingPlantType) {
                const tempPlant = new Plant(draggingPlantType, 0, 0);
                tempPlant.draw(mousePos.x, mousePos.y, 0.6);
            }
        }
        requestAnimationFrame(gameLoop);
    }

    resizeCanvas(); 
    initGrid(); 
    updateCardsUI(); 
    gameLoop();
</script>
</body>
